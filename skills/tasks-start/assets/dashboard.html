<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TASKS / SHAUGHV</title>
  <link rel="icon" type="image/svg+xml" href="https://cdn.shaughv.com/brand/shaughv/favicons/SHAUGHV-Favicon-Dark.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/svg+xml" href="https://cdn.shaughv.com/brand/shaughv/favicons/SHAUGHV-Favicon-Light.svg" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://cdn.shaughv.com" crossorigin>
  <!-- SHAUGHV fonts: Makira (display/body), IBM Plex Mono (labels/metadata), Unbounded (headlines) -->
  <link rel="stylesheet" href="https://cdn.shaughv.com/fonts/makira/makira.css">
  <link rel="stylesheet" href="https://cdn.shaughv.com/fonts/ibm-plex-mono/ibm-plex-mono.css">
  <link rel="stylesheet" href="https://cdn.shaughv.com/fonts/unbounded/unbounded.css">
  <!-- SHAUGHV animated brand mark + canonical loader (vanilla drop-ins, inherit currentColor) -->
  <script defer src="https://cdn.shaughv.com/js/animated-brand-mark.js"></script>
  <script defer src="https://cdn.shaughv.com/js/shaughv-loader.js"></script>
  <!-- Theme bootstrap: set surface before first paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('shaughv-tasks-theme');
        var dark = saved ? saved === "dark"
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    })();
  </script>
  <!-- Tiered asset loader (progressive enhancement; see references/board-server.md "Tiered dependencies").
       The static CDN stylesheet + script tags above are the file:// + online path. When the board is served
       over http (SERVER_MODE), this prefers the locally-provisioned /vendor/* copies first so the board
       renders fully offline, self-healing to the CDN, and finally to system fonts / the built-in motion
       engine. Behaviour is IDENTICAL at every tier — only the byte source changes. -->
  <script>
    (function () {
      try {
        var SERVER = location.protocol === 'http:' || location.protocol === 'https:';
        var head = document.head || document.getElementsByTagName('head')[0];
        function css(href) { var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = href; head.appendChild(l); }
        function js(src, onerror) { var s = document.createElement('script'); s.src = src; if (onerror) s.onerror = onerror; head.appendChild(s); }

        // Fonts — inject the locally-vendored stylesheet AFTER the CDN <link>s already in <head>.
        // fonts.css is itself local-first → CDN-fallback per @font-face, so the vendored weights win
        // when present and self-heal to the CDN otherwise; Makira (never bundled) + the system stack
        // still cover the rest. file:// keeps the CDN links only.
        if (SERVER) css('/vendor/fonts.css');

        // anime.js — optional alternate driver for the Slot Roll. Local → CDN → leave window.anime
        // undefined (the built-in CSS driver then runs, with identical motion). Loaded async; the
        // Slot Roll checks window.anime per-call, so whenever it lands it's picked up — no race.
        var ANIME_CDN = 'https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js';
        if (SERVER) js('/vendor/anime.min.js', function () { js(ANIME_CDN); });
        else js(ANIME_CDN);

        // Brand mark — prefer the vendored drop-in in SERVER_MODE. The CDN <script defer> in <head>
        // remains for file:// / online; animated-brand-mark.js self-guards customElements.define, so
        // loading both is safe (first wins). If <shaughv-mark> is still undefined a moment after load
        // (the true offline floor), register a tiny dependency-free text fallback so the mark/header
        // still read "SHAUGHV" instead of rendering empty.
        if (SERVER) js('/vendor/animated-brand-mark.js');
        setTimeout(function () {
          if (typeof customElements === 'undefined' || customElements.get('shaughv-mark')) return;
          try {
            customElements.define('shaughv-mark', class extends HTMLElement {
              connectedCallback() {
                var icon = this.hasAttribute('data-icon-only');
                this.style.display = 'inline-flex';
                this.style.alignItems = 'center';
                this.style.justifyContent = 'center';
                this.style.fontFamily = 'var(--font-display)';
                this.style.fontWeight = '700';
                this.style.lineHeight = '1';
                this.style.fontSize = icon ? '0.82em' : '0.5em';
                this.style.letterSpacing = icon ? '0' : '0.04em';
                if (!this.textContent.trim()) this.textContent = icon ? 'S' : 'SHAUGHV';
              }
            });
          } catch (e) {}
        }, 1500);
      } catch (e) {}
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: light;
      /* SHAUGHV - Vintage edition (cream + sage + olive) */
      --bg-primary: #F5F5F0;       /* cream-200 - page */
      --bg-secondary: #EAEAE1;     /* recessed wells / columns */
      --bg-card: #FAFAF8;          /* cream-100 - cards */
      --text-primary: #4C4436;     /* olive-dark */
      --text-secondary: #6C6456;   /* olive-light */
      --text-muted: rgba(92, 84, 70, 0.58);
      --accent: #5B8A5B;           /* sage - the action color */
      --accent-hover: #4A7A4A;     /* sage-dark */
      --accent-contrast: #FAFAF8;  /* text/icon on accent fills */
      --accent-tint: rgba(91, 138, 91, 0.10);
      --border: rgba(92, 84, 70, 0.20);
      --border-light: rgba(92, 84, 70, 0.10);
      --shadow: rgba(92, 84, 70, 0.06);
      --shadow-hover: rgba(92, 84, 70, 0.12);
      --overlay: rgba(76, 68, 54, 0.42);
      --font-display: "Unbounded", "Makira", system-ui, sans-serif;
      --font-body: "Makira", "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      /* SHAUGHV - Brutalist edition (near-black + brand orange) */
      --bg-primary: #0B0B0B;
      --bg-secondary: #161615;
      --bg-card: #1C1C1A;
      --text-primary: #FAFAF8;
      --text-secondary: rgba(250, 250, 248, 0.68);
      --text-muted: rgba(250, 250, 248, 0.42);
      --accent: #FF5E1A;           /* brand orange - the live brutalist signal color */
      --accent-hover: #E54E10;
      --accent-contrast: #0B0B0B;
      --accent-tint: rgba(255, 94, 26, 0.12);
      --border: rgba(250, 250, 248, 0.16);
      --border-light: rgba(250, 250, 248, 0.08);
      --shadow: rgba(0, 0, 0, 0.45);
      --shadow-hover: rgba(0, 0, 0, 0.60);
      --overlay: rgba(0, 0, 0, 0.62);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      padding: 20px 24px;
      line-height: 1.5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); }

    .header-left {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      margin-left: 16px;
    }

    .view-toggle button {
      background: transparent;
      border: none;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-muted);
      border-radius: 6px;
    }

    .view-toggle button:hover {
      color: var(--text-primary);
      background: transparent;
    }

    .view-toggle button.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 3px var(--shadow);
    }

    .buttons { display: flex; gap: 12px; }

    button {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s ease;
    }

    button:hover {
      background: var(--bg-secondary);
      border-color: var(--text-muted);
    }

    button.primary {
      background: var(--accent);
      color: var(--accent-contrast);
      border-color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== TASKS STYLES ===== */

    .board {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 24px;
      flex: 1;
      min-height: 0;
    }

    .column {
      background: var(--bg-secondary);
      border-radius: 12px;
      min-width: 340px;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: 100%;
    }

    .column-header {
      padding: 16px 18px;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: grab;
    }

    .column-header:active {
      cursor: grabbing;
    }

    .column.dragging-column {
      opacity: 0.5;
    }

    .column-drop-indicator {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 -2px;
      min-height: 100px;
    }

    .column-header .count {
      background: var(--bg-card);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .cards {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      min-height: 100px;
    }

    .cards.drag-over {
      background: var(--accent-tint);
      border-radius: 8px;
    }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: grab;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
      position: relative;
    }

    .task-card:hover {
      box-shadow: 0 4px 12px var(--shadow-hover);
      border-color: var(--border);
    }

    .task-card .add-on-hover {
      display: none;
    }

    .task-card:hover .add-on-hover {
      display: block;
    }

    .task-card .delete-btn {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      font-size: 14px;
      line-height: 1;
      border-radius: 4px;
    }

    .task-card:hover .delete-btn {
      display: block;
    }

    .task-card .delete-btn:hover {
      background: var(--bg-secondary);
      color: var(--accent);
    }

    .task-card.dragging {
      opacity: 0.5;
      transform: rotate(2deg);
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .card-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.4;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .card-subtasks {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-light);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .subtask {
      padding: 3px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      min-width: 18px;
      min-height: 18px;
      flex-shrink: 0;
      border: 2px solid var(--border);
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      cursor: pointer;
      transition: all 0.15s ease;
      background: var(--bg-card);
    }

    .checkbox:hover {
      border-color: var(--accent);
    }

    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox.checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
    }

    .empty-state button {
      font-size: 16px;
      padding: 14px 28px;
      background: var(--accent);
      border: none;
      color: var(--accent-contrast);
    }

    .empty-state button:hover {
      background: var(--accent-hover);
    }

    .status-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s ease;
      box-shadow: 0 4px 20px rgba(20, 20, 19, 0.15);
      z-index: 200;
    }

    .status-bar.visible { opacity: 1; }

    .add-card {
      padding: 12px;
    }

    .add-card button {
      width: 100%;
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--text-muted);
      font-weight: 500;
    }

    .add-card button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: transparent;
    }

    .new-task-input {
      width: 100%;
      background: var(--bg-card);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
    }

    .new-task-input:focus {
      outline: none;
    }

    .new-task-input::placeholder {
      color: var(--text-muted);
    }

    /* Scrollbar styling */
    .cards::-webkit-scrollbar,
    .list-view::-webkit-scrollbar {
      width: 6px;
    }

    .cards::-webkit-scrollbar-track,
    .list-view::-webkit-scrollbar-track {
      background: transparent;
    }

    .cards::-webkit-scrollbar-thumb,
    .list-view::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .cards::-webkit-scrollbar-thumb:hover,
    .list-view::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* List View Styles */
    .list-view {
      max-width: 800px;
      margin: 0 auto;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
    }

    .list-section {
      margin-bottom: 28px;
    }

    .list-section.drag-over {
      background: var(--accent-tint);
      border-radius: 8px;
      margin: 0 -12px 32px;
      padding: 0 12px;
    }

    .list-section-header {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      padding: 4px 0;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-section-header .section-title {
      cursor: pointer;
    }

    .list-section-header .section-title:hover {
      color: var(--text-primary);
    }

    .list-section-header .count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      cursor: grab;
      position: relative;
      border-radius: 10px;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .list-item:active {
      cursor: grabbing;
    }

    .list-item:hover {
      box-shadow: 0 4px 12px var(--shadow-hover);
      border-color: var(--border);
    }

    .list-item.dragging {
      opacity: 0.5;
      background: var(--bg-secondary);
    }

    .list-item .checkbox {
      margin-top: 2px;
      flex-shrink: 0;
    }

    .list-item-content {
      flex: 1;
      min-width: 0;
    }

    .list-item-title {
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .list-item-title.checked {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .list-item-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      cursor: pointer;
    }

    .list-item-note:hover {
      color: var(--text-secondary);
    }

    .list-item-note.add-note {
      font-style: italic;
      display: none;
    }

    .list-item:hover .list-item-note.add-note {
      display: block;
    }

    .list-item-subtasks {
      margin-top: 8px;
      padding-left: 2px;
    }

    .list-item-subtask {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 0;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .list-item-subtask .checkbox {
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      margin-top: 1px;
    }

    .list-item-subtask span {
      cursor: pointer;
    }

    .list-item-subtask span:hover {
      color: var(--text-primary);
    }

    .list-item-add-subtask {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      cursor: pointer;
      padding: 3px 0;
      padding-left: 24px;
      display: none;
    }

    .list-item:hover .list-item-add-subtask {
      display: block;
    }

    .list-item-add-subtask:hover {
      color: var(--accent);
    }

    .list-item-section {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .list-item-actions {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
    }

    .list-item:hover .list-item-actions {
      display: flex;
      gap: 4px;
    }

    .list-item-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      font-size: 14px;
      line-height: 1;
      border-radius: 4px;
    }

    .list-item-actions button:hover {
      background: var(--bg-card);
      color: var(--accent);
    }

    .list-drop-indicator {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 2px -12px;
    }

    .list-add-section {
      margin-top: 16px;
      padding: 16px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .list-add-section:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .quick-add {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .quick-add-input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 15px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
    }

    .quick-add-input::placeholder {
      color: var(--text-muted);
    }

    .quick-add-section {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .quick-add-section:hover {
      border-color: var(--accent);
    }

    .section-picker {
      position: absolute;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 20px var(--shadow-hover);
      padding: 4px;
      z-index: 100;
    }

    .section-picker button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      font-size: 13px;
      background: transparent;
      border: none;
      border-radius: 6px;
    }

    .section-picker button:hover {
      background: var(--bg-secondary);
    }

    /* ===== MEMORY STYLES ===== */

    .memory-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .memory-tab {
      background: transparent;
      color: var(--text-muted);
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s ease;
      text-transform: capitalize;
    }

    .memory-tab:hover { color: var(--text-primary); }

    .memory-tab.active {
      color: var(--text-primary);
      background: var(--bg-card);
      box-shadow: 0 1px 3px var(--shadow);
    }

    .memory-tab .count {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 6px;
      color: var(--text-muted);
    }

    .memory-tab.active .count {
      background: var(--border-light);
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .memory-flat-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .memory-flat-table th {
      text-align: left;
      padding: 10px 16px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .memory-flat-table td {
      padding: 9px 16px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      line-height: 1.4;
    }

    .memory-flat-table td:first-child {
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
      width: 120px;
    }

    .memory-flat-table tr:last-child td {
      border-bottom: none;
    }

    .memory-flat-table tr:hover td {
      background: var(--bg-secondary);
    }

    .memory-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .memory-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px var(--shadow-hover);
    }

    .memory-card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .memory-card-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .memory-card-preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    .memory-card-fields {
      margin-top: 10px;
      font-size: 12px;
    }

    .memory-card-field {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }

    .memory-card-field-label {
      color: var(--text-muted);
      min-width: 80px;
    }

    .memory-card-field-value {
      color: var(--text-secondary);
    }

    .file-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .file-card-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .file-card-header:hover {
      background: var(--bg-secondary);
    }

    .file-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .file-card-content {
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow-y: auto;
      display: none;
      color: var(--text-secondary);
    }

    .file-card-content.expanded {
      display: block;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 16px 24px;
      min-width: 100px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: capitalize;
      margin-top: 4px;
    }

    .search-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .add-btn {
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--text-muted);
      padding: 40px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .markdown-content {
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .markdown-content h1 { font-size: 1.4em; margin: 16px 0 8px; color: var(--text-primary); }
    .markdown-content h2 { font-size: 1.2em; margin: 14px 0 6px; color: var(--text-primary); }
    .markdown-content h3 { font-size: 1.1em; margin: 12px 0 4px; color: var(--text-secondary); }
    .markdown-content p { margin: 8px 0; }
    .markdown-content ul, .markdown-content ol { margin: 8px 0 8px 20px; }
    .markdown-content li { margin: 4px 0; }
    .markdown-content code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: var(--text-primary);
    }
    .markdown-content pre {
      background: var(--bg-secondary);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid var(--border-light);
    }
    .markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
    }
    .markdown-content th, .markdown-content td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    .markdown-content th {
      background: var(--bg-secondary);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(20, 20, 19, 0.2);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text-primary); }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ===== Task modal (rich view + edit) ===== */
    .modal.task-modal { max-width: 960px; max-height: 88vh; width: 92%; }
    @media (max-width: 640px) { .modal.task-modal { width: 96%; max-height: 94vh; } }
    .tm-id { font-family: var(--font-mono, ui-monospace, monospace); font-size: 12px; color: var(--text-muted); }
    .tm-title-input { width: 100%; font-size: 19px; font-weight: 600; font-family: var(--font-display, inherit); background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text-primary); outline: none; padding: 2px 0; }
    .tm-title-input:focus { border-bottom-color: var(--accent); }
    .tm-section-label { font-family: var(--font-mono, ui-monospace, monospace); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 18px 0 6px; }
    .tm-section-label:first-child { margin-top: 0; }
    .tm-note-input { width: 100%; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; }
    .tm-note-input:focus { border-color: var(--accent); }
    .tm-row-between { display: flex; align-items: center; justify-content: space-between; }
    .tm-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 12px; padding: 4px 12px; cursor: pointer; font-family: inherit; }
    .tm-btn:hover { border-color: var(--accent); }
    .tm-desc-rendered { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-size: 14px; }
    .tm-desc-rendered h2 { font-size: 17px; margin: 12px 0 6px; }
    .tm-desc-rendered h3 { font-size: 15px; margin: 10px 0 4px; }
    .tm-desc-rendered h4 { font-size: 13px; margin: 8px 0 4px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .tm-desc-rendered p { margin: 6px 0; line-height: 1.55; }
    .tm-desc-rendered ul, .tm-desc-rendered ol { margin: 6px 0 6px 22px; }
    .tm-desc-rendered li { margin: 3px 0; line-height: 1.5; }
    .tm-desc-rendered code { font-family: ui-monospace, monospace; font-size: 12px; background: var(--bg-card); padding: 1px 5px; border-radius: 4px; }
    .tm-desc-rendered pre { background: var(--bg-card); padding: 10px 12px; border-radius: 6px; overflow-x: auto; }
    .tm-desc-rendered pre code { background: none; padding: 0; }
    .tm-desc-rendered a { color: var(--accent); }
    .tm-ttdr { border-left: 3px solid var(--accent); background: var(--bg-card); padding: 8px 12px; border-radius: 0 6px 6px 0; margin: 0 0 10px; line-height: 1.5; }
    .tm-desc-edit { width: 100%; min-height: 260px; resize: vertical; background: var(--bg-card); border: 1px solid var(--accent); border-radius: 8px; padding: 12px; color: var(--text-primary); font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.55; outline: none; box-sizing: border-box; }
    .tm-sub { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; column-gap: 10px; row-gap: 6px; align-items: start; padding: 8px 0; }
    .tm-sub .tm-sub-text { flex: 1; background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; padding: 2px 0; }
    .tm-sub .tm-sub-text:focus { border-bottom-color: var(--accent); }
    .tm-sub .tm-sub-text.checked { text-decoration: line-through; color: var(--text-muted); }
    .tm-sub-desc { grid-column: 2 / 4; width: 100%; min-height: 42px; resize: vertical; box-sizing: border-box; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 7px 9px; color: var(--text-secondary); font-family: inherit; font-size: 12.5px; line-height: 1.45; outline: none; }
    .tm-sub-desc:focus { border-color: var(--accent); color: var(--text-primary); }
    .tm-sub-del { color: var(--text-muted); cursor: pointer; background: none; border: none; font-size: 16px; line-height: 1; }
    .tm-sub-del:hover { color: var(--accent); }
    .tm-add { color: var(--text-muted); cursor: pointer; font-style: italic; font-size: 13px; padding: 6px 0; }
    .tm-add:hover { color: var(--accent); }
    .tm-activity { list-style: none; padding: 0; margin: 0; }
    .tm-activity li { font-size: 12.5px; color: var(--text-muted); padding: 5px 0; border-bottom: 1px dashed var(--border); font-family: ui-monospace, monospace; }
    .tm-activity li:last-child { border-bottom: none; }
    .tm-activity .tm-empty { font-style: italic; }
    .tm-blocked { color: var(--accent); font-size: 13px; margin-top: 6px; font-family: ui-monospace, monospace; }
    .task-card { cursor: pointer; }

    /* ===== Freshness / staleness indicator ===== */
    #freshness { font-family: ui-monospace, monospace; font-size: 11px; padding: 2px 9px; border-radius: 999px; white-space: nowrap; letter-spacing: 0.02em; }
    #freshness.fresh { color: #fff; background: var(--accent); }
    #freshness.aging { color: var(--text-muted); background: var(--bg-primary); border: 1px solid var(--border); }
    #freshness.stale { color: #fff; background: #b3261e; }

    /* Card "just changed" pulse + the FLIP ghost that glides between columns. */
    @keyframes task-pulse {
      0%   { box-shadow: 0 0 0 0 var(--accent); }
      15%  { box-shadow: 0 0 0 3px var(--accent); }
      100% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); }
    }
    .task-card.just-changed { animation: task-pulse 1.05s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .task-card.flip-ghost { box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.45); }
    @media (prefers-reduced-motion: reduce) {
      .task-card.just-changed { animation: none; }
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .form-group textarea {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      line-height: 1.5;
      min-height: 300px;
      resize: vertical;
    }

    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Tab panel containers */
    .tab-panel {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }

    .tab-panel.active {
      display: flex;
    }

    /* Memory panel scrollable area */
    .memory-content-area {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .memory-content-area::-webkit-scrollbar {
      width: 6px;
    }

    .memory-content-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .memory-content-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .memory-content-area::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .file-card-content::-webkit-scrollbar,
    .modal-body::-webkit-scrollbar {
      width: 6px;
    }

    .file-card-content::-webkit-scrollbar-track,
    .modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .file-card-content::-webkit-scrollbar-thumb,
    .modal-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .file-card-content::-webkit-scrollbar-thumb:hover,
    .modal-body::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* File path display */
    .file-path {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    /* ===== SHAUGHV TYPOGRAPHY LAYER ===== */
    h1, .app-title { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.005em; }
    .app-title { font-size: 1.35rem; }
    .stat-value { font-family: var(--font-display); font-weight: 700; }
    .column-header, .list-section-header, .memory-tab, .view-toggle button,
    .memory-flat-table th, .form-group label, .stat-label, .file-path,
    .quick-add-section, .list-item-section, .count, .markdown-content th {
      font-family: var(--font-mono);
    }
    button { letter-spacing: 0.01em; }
    ::selection { background: var(--accent); color: var(--accent-contrast); }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <shaughv-mark class="brand-mark" data-icon-only aria-label="SHAUGHV" style="height: 44px; width: 44px; margin-right: 16px; flex-shrink: 0; color: var(--accent);"></shaughv-mark>
      <div>
        <h1 class="app-title">Tasks</h1>
        <div id="filePath" class="file-path"></div>
      </div>
      <div class="view-toggle" id="mainTabToggle">
        <button id="tasksTabBtn" class="active">Tasks</button>
        <button id="memoryTabBtn">Memory</button>
      </div>
      <div class="view-toggle" id="taskViewToggle">
        <button id="boardViewBtn" class="active">Board</button>
        <button id="listViewBtn">List</button>
      </div>
    </div>
    <div class="buttons">
      <button id="themeToggle" title="Toggle light / dark" aria-label="Toggle theme">Dark</button>
      <button id="openTaskBtn">Select File</button>
      <button id="openMemoryBtn" style="display: none;">Open Folder</button>
      <button id="saveBtn" class="primary" disabled style="display: none;">Save</button>
    </div>
  </header>

  <!-- TASKS TAB PANEL -->
  <div class="tab-panel active" id="tasksPanel">
    <div class="list-view" id="listView" style="display: none;"></div>
    <div class="board" id="board">
      <div class="empty-state" id="boardEmptyState" style="width: 100%;">
        <shaughv-mark aria-label="SHAUGHV" style="display:block; height: 88px; width: 88px; color: var(--accent); margin: 0 auto 28px;"></shaughv-mark>
        <p style="margin-bottom: 8px; font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.02em; font-size: 20px; color: var(--text-primary);">Your tasks, in focus</p>
        <p style="margin-bottom: 24px; font-size: 15px; color: var(--text-muted);">Select your TASKS.md file to load the board.</p>
        <button id="openBtnLarge">Select TASKS.md</button>
      </div>
    </div>
  </div>

  <!-- MEMORY TAB PANEL -->
  <div class="tab-panel" id="memoryPanel">
    <div id="memoryEmptyState" class="empty-state">
      <shaughv-mark aria-label="SHAUGHV" style="display:block; height: 88px; width: 88px; color: var(--accent); margin: 0 auto 28px;"></shaughv-mark>
      <p style="margin-bottom: 8px; font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.02em; font-size: 20px; color: var(--text-primary);">Workplace memory</p>
      <p style="margin-bottom: 24px; font-size: 15px; color: var(--text-muted);">Select your project folder to browse what I know.</p>
      <button id="openMemoryBtnLarge">Select Folder</button>
    </div>
    <div id="memoryMainContent" style="display: none; flex-direction: column; min-height: 0; flex: 1;">
      <div class="memory-tabs" id="memoryTabsContainer"></div>
      <div class="memory-content-area">
        <div id="memoryContentContainer"></div>
      </div>
    </div>
  </div>

  <!-- MODAL (shared for memory) -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Edit</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button id="modalCancel">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      </div>
    </div>
  </div>

  <!-- TASK MODAL (rich view + edit for a single task: description, notes, subtasks, activity) -->
  <div class="modal-overlay" id="taskModalOverlay">
    <div class="modal task-modal">
      <div class="modal-header">
        <div style="display:flex; align-items:center; gap:12px; flex:1; min-width:0;">
          <span class="checkbox" id="tmCheckbox" title="Toggle done" style="flex-shrink:0;"></span>
          <input type="text" class="tm-title-input" id="tmTitle" placeholder="Task title">
        </div>
        <div style="display:flex; align-items:center; gap:14px; flex-shrink:0;">
          <span class="tm-id" id="tmId"></span>
          <button class="modal-close" id="tmClose">&times;</button>
        </div>
      </div>
      <div class="modal-body" id="tmBody"></div>
      <div class="modal-footer">
        <button class="tm-btn" id="tmDelete" style="margin-right:auto; color:#b3261e; border-color:#b3261e;">Delete task</button>
        <button id="tmDoneBtn" class="primary">Close</button>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status"></div>

  <script>
    // ===== SHAUGHV THEME TOGGLE =====
    (function () {
      var KEY = 'shaughv-tasks-theme';
      var root = document.documentElement;
      var btn = document.getElementById('themeToggle');
      function syncLabel() {
        if (btn) btn.textContent = root.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark';
      }
      syncLabel();
      if (btn) btn.addEventListener('click', function () {
        var isDark = root.getAttribute('data-theme') === 'dark';
        if (isDark) root.removeAttribute('data-theme');
        else root.setAttribute('data-theme', 'dark');
        try { localStorage.setItem(KEY, isDark ? 'light' : 'dark'); } catch (e) {}
        syncLabel();
      });
    })();

    // ===== SHARED STATE =====
    let activeMainTab = 'tasks'; // 'tasks' or 'memory'

    // When this page is served by board-server.mjs over http(s), we talk to its REST + SSE
    // API and the files live server-side (clean, reliable, auto-loading). When it's opened
    // as a file:// page, we fall back to the File System Access API (the legacy flow with
    // manual "Select TASKS.md" / "Select Folder" pickers + 1s polling). Everything below
    // branches on this one flag.
    const SERVER_MODE = location.protocol === 'http:' || location.protocol === 'https:';

    const statusEl = document.getElementById('status');
    const filePathEl = document.getElementById('filePath');

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.add('visible');
      setTimeout(() => statusEl.classList.remove('visible'), 2000);
    }

    // ===== MAIN TAB SWITCHING =====
    const tasksTabBtn = document.getElementById('tasksTabBtn');
    const memoryTabBtn = document.getElementById('memoryTabBtn');
    const tasksPanel = document.getElementById('tasksPanel');
    const memoryPanel = document.getElementById('memoryPanel');
    const taskViewToggle = document.getElementById('taskViewToggle');
    const openTaskBtn = document.getElementById('openTaskBtn');
    const openMemoryBtn = document.getElementById('openMemoryBtn');
    const saveBtn = document.getElementById('saveBtn');

    function switchMainTab(tab) {
      activeMainTab = tab;

      tasksTabBtn.classList.toggle('active', tab === 'tasks');
      memoryTabBtn.classList.toggle('active', tab === 'memory');

      tasksPanel.classList.toggle('active', tab === 'tasks');
      memoryPanel.classList.toggle('active', tab === 'memory');

      // Show/hide view toggle for tasks
      taskViewToggle.style.display = tab === 'tasks' ? 'flex' : 'none';

      // Show/hide appropriate buttons
      openTaskBtn.style.display = tab === 'tasks' ? 'inline-flex' : 'none';
      openMemoryBtn.style.display = tab === 'memory' ? 'inline-flex' : 'none';
      saveBtn.style.display = tab === 'tasks' ? 'inline-flex' : 'none';

      // Update file path display
      if (tab === 'tasks') {
        filePathEl.textContent = SERVER_MODE
          ? (taskFileName ? 'TASKS.md' : '')
          : (taskFileHandle ? taskFileName : '');
      } else {
        filePathEl.textContent = SERVER_MODE
          ? '.tasks/ memory'
          : (memoryDirHandle ? memoryDirHandle.name : '');
      }
    }

    tasksTabBtn.addEventListener('click', () => switchMainTab('tasks'));
    memoryTabBtn.addEventListener('click', () => switchMainTab('memory'));

    // ============================================================
    // ===== TASKS FUNCTIONALITY =====
    // ============================================================

    let taskFileHandle = null;
    let taskFileName = '';
    let sections = [];
    let tasks = {};
    let hasChanges = false;
    let currentView = 'board';
    let quickAddSection = null;

    const board = document.getElementById('board');
    const listView = document.getElementById('listView');
    const listViewBtn = document.getElementById('listViewBtn');
    const boardViewBtn = document.getElementById('boardViewBtn');

    function taskSectionId(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    // ===== Task IDs + prerequisites =====
    // Every task carries a short, stable, random base-36 id (e.g. "a3f") so it can be
    // referenced as a prerequisite by another task. A task is "blocked" while any of its
    // prerequisites is not yet done.
    function genTaskId(used) {
      let id;
      do { id = (Math.random().toString(36) + '000').slice(2, 5); } while (!id || used.has(id));
      used.add(id);
      return id;
    }
    function currentTaskIds() {
      const s = new Set();
      for (const sec of sections) for (const t of (tasks[sec.id] || [])) if (t.id) s.add(t.id);
      return s;
    }
    function taskById(id) {
      for (const sec of sections) for (const t of (tasks[sec.id] || [])) if (t.id === id) return t;
      return null;
    }
    function unmetNeeds(task) {
      if (!task.needs || !task.needs.length) return [];
      // A prerequisite is "unmet" only if it exists and isn't done. Unknown/dangling ids
      // are treated as satisfied so a card can never get permanently stuck.
      return task.needs.filter(nid => { const t = taskById(nid); return t && !t.checked; });
    }
    function isBlocked(task) { return unmetNeeds(task).length > 0; }
    function openSubtasks(task) { return (task.subtasks || []).filter(st => !st.checked); }

    function parseTaskMarkdown(content) {
      const resultSections = [];
      const resultTasks = {};
      let currentSection = null;
      let currentSectionId = null;

      const lines = content.split('\n');
      let currentTask = null;
      let currentSubtask = null;

      for (const line of lines) {
        const headerMatch = line.match(/^## \*{0,2}(.+?)\*{0,2}$/);
        if (headerMatch) {
          if (currentTask && currentSectionId) {
            resultTasks[currentSectionId].push(currentTask);
            currentTask = null;
            currentSubtask = null;
          }

          const sectionName = headerMatch[1].trim();
          currentSectionId = taskSectionId(sectionName);
          currentSection = sectionName;

          if (!resultTasks[currentSectionId]) {
            resultSections.push({ id: currentSectionId, name: sectionName });
            resultTasks[currentSectionId] = [];
          }
        } else if (currentSectionId && line.match(/^- \[[ xX]\]/)) {
          if (currentTask) {
            resultTasks[currentSectionId].push(currentTask);
          }
          const checked = line.match(/\[[xX]\]/) !== null;
          let text = line.replace(/^- \[[ xX]\]\s*/, '');

          // Pull out the prerequisite list "(needs #a3f, #k2p)" and the task's own
          // trailing id "#a3f" before parsing title/note. Order matters: needs first
          // (it also contains #ids), then the trailing id.
          let needs = [];
          const needsMatch = text.match(/\(needs\s+([^)]*)\)/i);
          if (needsMatch) {
            needs = (needsMatch[1].match(/[0-9a-z]{2,}/gi) || []).map(s => s.toLowerCase());
            text = text.replace(needsMatch[0], '').trim();
          }
          let id = null;
          const idMatch = text.match(/#([0-9a-z]{2,})\s*$/i);
          if (idMatch) { id = idMatch[1].toLowerCase(); text = text.replace(/\s*#[0-9a-z]{2,}\s*$/i, '').trim(); }

          let title = text;
          let note = '';
          const boldMatch = text.match(/^\*\*(.+?)\*\*(.*)$/);
          if (boldMatch) {
            title = boldMatch[1];
            note = boldMatch[2].replace(/^\s*-\s*/, '').trim();
          }

          currentTask = {
            id,
            needs,
            title,
            note,
            checked,
            subtasks: [],
            section: currentSectionId
          };
          currentSubtask = null;
        } else if (currentTask && line.match(/^\s+- \[[ xX]\]/)) {
          const checked = line.match(/\[[xX]\]/) !== null;
          const text = line.replace(/^\s+- \[[ xX]\]\s*/, '');
          currentSubtask = { text, checked, description: '' };
          currentTask.subtasks.push(currentSubtask);
        } else if (currentTask && currentSubtask && line.match(/^\s{4,}/)) {
          const descLine = line.replace(/^\s{4,}>?\s?/, '');
          currentSubtask.description = [currentSubtask.description, descLine].filter(Boolean).join('\n');
        }
      }

      if (currentTask && currentSectionId) {
        resultTasks[currentSectionId].push(currentTask);
      }

      // Backfill stable short ids for any task missing one and de-dupe collisions, so
      // every task can be referenced as a prerequisite. (Backfilled ids persist on next save.)
      const used = new Set();
      const flat = [];
      for (const sid in resultTasks) for (const t of resultTasks[sid]) flat.push(t);
      for (const t of flat) { if (t.id && !used.has(t.id)) used.add(t.id); else if (t.id) t.id = null; }
      for (const t of flat) { if (!t.id) t.id = genTaskId(used); }

      return { sections: resultSections, tasks: resultTasks };
    }

    function toMarkdown() {
      let md = '# Tasks\n';

      sections.forEach((section, idx) => {
        md += `\n## ${section.name}\n`;
        const sectionTasks = tasks[section.id] || [];
        sectionTasks.forEach(t => {
          const checkbox = t.checked ? '[x]' : '[ ]';
          const note = t.note ? ` - ${t.note}` : '';
          const needs = (t.needs && t.needs.length) ? ` (needs ${t.needs.map(n => '#' + n).join(', ')})` : '';
          const idTag = t.id ? ` #${t.id}` : '';
          md += `- ${checkbox} **${t.title}**${note}${needs}${idTag}\n`;
          t.subtasks.forEach(st => {
            const stCheckbox = st.checked ? '[x]' : '[ ]';
            md += `  - ${stCheckbox} ${st.text}\n`;
            if (st.description && st.description.trim()) {
              st.description.replace(/\r\n/g, '\n').split('\n').forEach(line => {
                md += `    > ${line}\n`;
              });
            }
          });
        });
      });

      return md.trimEnd() + '\n';
    }

    // Cards are READ-ONLY surfaces: a click anywhere opens the rich task modal where ALL
    // editing happens (title, note, description, subtasks, prerequisites, done, delete).
    // The card itself only displays state + supports drag-to-move. (A real drag is
    // distinguished from a click so dropping a card never also opens the modal.)
    function createCard(task) {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.draggable = true;
      card.dataset.id = task.id;

      const unmet = unmetNeeds(task);
      const blocked = unmet.length > 0;
      if (blocked) card.style.opacity = '0.6';

      const subDone = task.subtasks.filter(s => s.checked).length;
      const subTotal = task.subtasks.length;

      let html = `
        <div style="display: flex; align-items: flex-start; gap: 10px;">
          <span class="checkbox ${task.checked ? 'checked' : ''}" style="pointer-events: none; flex-shrink: 0; margin-top: 1px;"></span>
          <div class="card-title" style="flex: 1; min-width: 0; ${task.checked ? 'text-decoration: line-through; opacity: 0.55;' : ''}">${escapeHtml(task.title)}</div>
          <span title="task id" style="font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-muted); opacity: 0.75; white-space: nowrap;">#${task.id}</span>
        </div>
      `;

      if (task.note) {
        html += `<div class="card-note" style="margin-left: 26px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(task.note)}</div>`;
      }

      const metaBits = [];
      if (subTotal) metaBits.push(`<span title="subtasks done">☑ ${subDone}/${subTotal}</span>`);
      if (blocked) metaBits.push(`<span style="color: var(--accent);" title="Blocked until prerequisites are done">🔒 needs ${unmet.map(id => '#' + id).join(', ')}</span>`);
      if (metaBits.length) {
        html += `<div style="margin-left: 26px; margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); font-family: ui-monospace, monospace;">${metaBits.join('')}</div>`;
      }

      card.innerHTML = html;

      // Distinguish a genuine drag from a click: only open the modal if the pointer didn't
      // move far between mousedown and click (a drag sets `dragged`).
      let dragged = false;
      card.addEventListener('dragstart', (e) => {
        dragged = true;
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', task.id);
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        setTimeout(() => { dragged = false; }, 60);
      });
      card.addEventListener('click', () => { if (!dragged) openTaskModal(task); });

      return card;
    }

    function startEditingTitle(titleEl, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.title;
      input.style.cssText = 'width: 100%; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 6px 10px; color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none;';

      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== task.title) {
          task.title = newTitle;
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startEditingNote(noteEl, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.note || '';
      input.placeholder = 'Add a note...';
      input.style.cssText = 'width: 100%; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 4px 8px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      noteEl.replaceWith(input);
      input.focus();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        task.note = input.value.trim();
        markChanged();
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startEditingSubtask(subtaskEl, task, idx) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.subtasks[idx].text;
      input.style.cssText = 'width: calc(100% - 30px); background: var(--bg-card); border: 2px solid var(--accent); border-radius: 4px; padding: 2px 6px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      subtaskEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newText = input.value.trim();
        if (newText) { task.subtasks[idx].text = newText; }
        else { task.subtasks.splice(idx, 1); }
        markChanged();
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startAddingSubtask(el, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'New subtask...';
      input.style.cssText = 'width: calc(100% - 10px); background: var(--bg-card); border: 2px solid var(--accent); border-radius: 4px; padding: 2px 6px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      el.replaceWith(input);
      input.focus();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const text = input.value.trim();
        if (text) { task.subtasks.push({ text, checked: false, description: '' }); markChanged(); }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startEditingColumnTitle(titleEl, colId) {
      const section = sections.find(s => s.id === colId);
      if (!section) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = section.name;
      input.style.cssText = 'width: 180px; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 4px 10px; color: var(--text-primary); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-family: inherit; outline: none;';

      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newName = input.value.trim();
        if (newName && newName !== section.name) {
          const oldId = section.id;
          section.name = newName;
          const newId = taskSectionId(newName);
          if (newId !== oldId) {
            tasks[newId] = tasks[oldId] || [];
            delete tasks[oldId];
            tasks[newId].forEach(t => t.section = newId);
            section.id = newId;
          }
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function createColumn(id, title, items) {
      const col = document.createElement('div');
      col.className = 'column';
      col.innerHTML = `
        <div class="column-header">
          <span class="column-title" data-section-id="${id}" style="cursor: pointer;">${title}</span>
          <span class="count" data-count-for="${id}">${items.length}</span>
        </div>
        <div class="cards" data-column="${id}"></div>
        <div class="add-card">
          <button data-add="${id}">+ Add task</button>
        </div>
      `;

      col.querySelector('.column-title').addEventListener('click', (e) => {
        if (!col.dragging) { startEditingColumnTitle(e.target, id); }
      });

      const header = col.querySelector('.column-header');
      header.draggable = true;

      header.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        col.classList.add('dragging-column');
        e.dataTransfer.setData('text/column', id);
        e.dataTransfer.effectAllowed = 'move';
      });

      header.addEventListener('dragend', () => {
        col.classList.remove('dragging-column');
        board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
      });

      col.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('text/column')) {
          e.preventDefault();
          e.stopPropagation();
          board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
          const indicator = document.createElement('div');
          indicator.className = 'column-drop-indicator';
          const rect = col.getBoundingClientRect();
          if (e.clientX < rect.left + rect.width / 2) { col.before(indicator); }
          else { col.after(indicator); }
        }
      });

      col.addEventListener('drop', (e) => {
        if (e.dataTransfer.types.includes('text/column')) {
          e.preventDefault();
          e.stopPropagation();
          const fromId = e.dataTransfer.getData('text/column');
          const toId = id;
          if (fromId !== toId) {
            const rect = col.getBoundingClientRect();
            const insertBefore = e.clientX < rect.left + rect.width / 2;
            moveSection(fromId, toId, insertBefore);
          }
          board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
        }
      });

      const cardsContainer = col.querySelector('.cards');
      items.forEach(task => { cardsContainer.appendChild(createCard(task)); });

      const getDropPosition = (e) => {
        const allCards = [...cardsContainer.querySelectorAll('.task-card')];
        const visibleCards = allCards.filter(c => !c.classList.contains('dragging'));
        let insertBeforeCard = null;
        let dropIndex = visibleCards.length;
        for (let i = 0; i < visibleCards.length; i++) {
          const rect = visibleCards[i].getBoundingClientRect();
          if (e.clientY < rect.top + rect.height / 2) {
            insertBeforeCard = visibleCards[i];
            dropIndex = i;
            break;
          }
        }
        return { insertBeforeCard, dropIndex };
      };

      const showDropIndicator = (e) => {
        col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        const { insertBeforeCard } = getDropPosition(e);
        const indicator = document.createElement('div');
        indicator.className = 'drop-indicator';
        indicator.style.cssText = 'height: 3px; background: var(--accent); border-radius: 2px; margin: 5px 0;';
        if (insertBeforeCard) { cardsContainer.insertBefore(indicator, insertBeforeCard); }
        else { cardsContainer.appendChild(indicator); }
      };

      col.addEventListener('dragover', (e) => {
        e.preventDefault();
        cardsContainer.classList.add('drag-over');
        showDropIndicator(e);
      });

      col.addEventListener('dragleave', (e) => {
        if (!col.contains(e.relatedTarget)) {
          cardsContainer.classList.remove('drag-over');
          col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        }
      });

      col.addEventListener('drop', (e) => {
        e.preventDefault();
        cardsContainer.classList.remove('drag-over');
        col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        const taskId = e.dataTransfer.getData('text/plain');
        const { dropIndex } = getDropPosition(e);
        moveTask(taskId, id, dropIndex);
      });

      col.querySelector(`[data-add="${id}"]`).addEventListener('click', () => {
        addNewTask(id, col.querySelector('.cards'));
      });

      return col;
    }

    function addNewTask(sectionId, container) {
      const existing = container.querySelector('.new-task-input');
      if (existing) return;

      const input = document.createElement('textarea');
      input.className = 'new-task-input';
      input.placeholder = 'What needs to be done?';
      input.rows = 2;
      container.appendChild(input);
      input.focus();

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const title = input.value.trim();
          if (title) {
            if (!tasks[sectionId]) tasks[sectionId] = [];
            tasks[sectionId].push({
              id: genTaskId(currentTaskIds()),
              needs: [],
              title,
              note: '',
              checked: false,
              subtasks: [],
              section: sectionId
            });
            markChanged();
            renderTasks();
          } else { input.remove(); }
        } else if (e.key === 'Escape') { input.remove(); }
      });

      input.addEventListener('blur', () => { setTimeout(() => input.remove(), 100); });
    }

    function moveSection(fromId, toId, insertBefore) {
      const fromIdx = sections.findIndex(s => s.id === fromId);
      const toIdx = sections.findIndex(s => s.id === toId);
      if (fromIdx === -1 || toIdx === -1) return;
      const [section] = sections.splice(fromIdx, 1);
      let newIdx = sections.findIndex(s => s.id === toId);
      if (!insertBefore) newIdx++;
      sections.splice(newIdx, 0, section);
      markChanged();
      renderTasks();
    }

    function moveTask(taskId, toSectionId, dropIndex = -1) {
      // Locate the task first WITHOUT removing it, so a blocked move can be refused cleanly.
      let task = null, fromSectionId = null, fromIdx = -1;
      for (const section of sections) {
        const sectionTasks = tasks[section.id] || [];
        const idx = sectionTasks.findIndex(t => t.id === taskId);
        if (idx !== -1) { task = sectionTasks[idx]; fromSectionId = section.id; fromIdx = idx; break; }
      }
      if (!task) return;

      // Gate: a blocked task can't be moved INTO the Active column until its prerequisites
      // are done. (Reordering within a column, or moving elsewhere, is always allowed.)
      if (toSectionId === 'active' && fromSectionId !== toSectionId && isBlocked(task)) {
        const unmet = unmetNeeds(task).map(id => '#' + id).join(', ');
        showStatus(`Blocked — finish ${unmet} before moving this to Active`);
        renderTasks(); // snap the card back
        return;
      }
      if (toSectionId === 'done' && fromSectionId !== toSectionId) {
        const unmet = unmetNeeds(task);
        if (unmet.length) {
          showStatus(`Blocked — finish ${unmet.map(id => '#' + id).join(', ')} before moving this to Done`);
          renderTasks(); // snap the card back
          return;
        }
        if (openSubtasks(task).length) {
          showStatus('Blocked — finish or remove open subtasks before moving this to Done');
          renderTasks(); // snap the card back
          return;
        }
      }

      tasks[fromSectionId].splice(fromIdx, 1);
      task.section = toSectionId;
      if (!tasks[toSectionId]) tasks[toSectionId] = [];
      if (dropIndex >= 0 && dropIndex <= tasks[toSectionId].length) {
        tasks[toSectionId].splice(dropIndex, 0, task);
      } else {
        tasks[toSectionId].push(task);
      }
      markChanged();
      renderTasks();
    }

    function deleteTask(task) {
      if (!confirm(`Delete "${task.title}"?`)) return;
      for (const section of sections) {
        const sectionTasks = tasks[section.id] || [];
        const idx = sectionTasks.findIndex(t => t.id === task.id);
        if (idx !== -1) { sectionTasks.splice(idx, 1); break; }
      }
      // Drop the per-task detail file so it can't outlive the task (or bleed into a future
      // task that reuses the id). Fire-and-forget; server mode only.
      if (SERVER_MODE && task.id) {
        fetch('/api/task?id=' + encodeURIComponent(task.id), { method: 'DELETE' }).catch(() => {});
      }
      markChanged();
      renderTasks();
    }

    let saveTimeout = null;
    let lastModified = 0;
    let watchInterval = null;
    let isSaving = false;

    function markChanged() {
      hasChanges = true;
      saveBtn.disabled = false;
      markBoardUpdated();              // any edit resets the freshness clock to "live"
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(autoSave, 500);
    }

    async function autoSave() {
      if (!hasChanges) return;
      if (SERVER_MODE) { await saveTasksToServer(); return; }
      if (!taskFileHandle || isSaving) return;
      isSaving = true;
      try {
        const writable = await taskFileHandle.createWritable();
        const content = toMarkdown();
        await writable.write(content);
        await writable.close();
        const file = await taskFileHandle.getFile();
        lastModified = file.lastModified;
        hasChanges = false;
        saveBtn.disabled = true;
        showStatus('Saved');
      } catch (e) {
        showStatus('Save failed: ' + e.message);
      }
      isSaving = false;
    }

    // ===== SERVER MODE: live task I/O via board-server.mjs (fetch + SSE) =====
    let evtSource = null;

    async function loadTasksFromServer(initial) {
      try {
        const res = await fetch('/api/tasks');
        const content = await res.text();
        lastModified = Number(res.headers.get('X-Board-Mtime')) || 0;
        const result = parseTaskMarkdown(content);
        sections = result.sections;
        tasks = result.tasks;
        taskFileName = 'TASKS.md';
        if (activeMainTab === 'tasks') filePathEl.textContent = 'TASKS.md';
        if (initial) switchTaskView('board'); else renderTasks();
        markBoardUpdated();             // an agent (or reload) just refreshed the board
        showStatus(initial ? 'Live board connected' : 'Reloaded');
      } catch (e) { showStatus('Board load failed: ' + e.message); }
    }

    async function saveTasksToServer() {
      if (isSaving) return;
      isSaving = true;
      try {
        const res = await fetch('/api/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'text/markdown', 'X-Base-Mtime': String(lastModified) },
          body: toMarkdown(),
        });
        if (res.status === 409) {
          // An agent changed TASKS.md under us — reload latest rather than stomp its write.
          const latest = await res.text();
          lastModified = Number(res.headers.get('X-Board-Mtime')) || lastModified;
          const result = parseTaskMarkdown(latest);
          sections = result.sections;
          tasks = result.tasks;
          hasChanges = false;
          saveBtn.disabled = true;
          renderTasks();
          showStatus('Board changed on disk — reloaded. Re-apply your edit.');
          return;
        }
        lastModified = Number(res.headers.get('X-Board-Mtime')) || lastModified;
        hasChanges = false;
        saveBtn.disabled = true;
        showStatus('Saved');
      } catch (e) {
        showStatus('Save failed: ' + e.message);
      } finally {
        isSaving = false;
      }
    }

    function startServerWatch() {
      if (evtSource) evtSource.close();
      try {
        evtSource = new EventSource('/api/events');
        evtSource.addEventListener('change', (e) => {
          let kind = 'tasks';
          try { kind = (JSON.parse(e.data) || {}).kind || 'tasks'; } catch (_) {}
          if (kind === 'tasks') {
            if (!hasChanges && !isSaving) loadTasksFromServer(false);
          } else if (kind === 'memory' && activeMainTab === 'memory') {
            loadMemoryFromServer();
          }
        });
      } catch (e) { /* SSE unavailable — board still works, just not live */ }
    }

    async function checkForExternalChanges() {
      if (!taskFileHandle || hasChanges || isSaving) return;
      try {
        const file = await taskFileHandle.getFile();
        if (file.lastModified > lastModified) {
          lastModified = file.lastModified;
          const content = await file.text();
          const result = parseTaskMarkdown(content);
          sections = result.sections;
          tasks = result.tasks;
          renderTasks();
          markBoardUpdated();
          showStatus('Reloaded');
        }
      } catch (e) { console.log('Watch error:', e); }
    }

    function startWatching() {
      if (SERVER_MODE) { startServerWatch(); return; }
      if (watchInterval) clearInterval(watchInterval);
      watchInterval = setInterval(checkForExternalChanges, 1000);

    function stopWatching() {

          for (let i = 0; i < items.length; i++) {

            if (e.clientY < rect.top + rect.height / 2) {
              insertBeforeEl = items[i];

    let memoryDirHandle = null;

    const memoryEmptyState = document.getElementById('memoryEmptyState');
    const memoryMainContent = document.getElementById('memoryMainContent');

    const memoryContentContainer = document.getElementById('memoryContentContainer');
