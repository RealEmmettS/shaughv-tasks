    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function parseMemoryMarkdown(content) {
      const parsed = {
        title: '',
        fields: {},
        sections: {},
        tables: [],
        rawContent: content
      };

      const lines = content.split('\n');
      let currentSection = '_intro';
      parsed.sections[currentSection] = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.match(/^# /)) {
          parsed.title = line.replace(/^# /, '').trim();
          continue;
        }

        if (line.match(/^## /)) {
          currentSection = line.replace(/^## /, '').trim();
          parsed.sections[currentSection] = [];
          continue;
        }

        const kvMatch = line.match(/^\*\*(.+?):\*\*\s*(.*)$/);
        if (kvMatch) {
          parsed.fields[kvMatch[1]] = kvMatch[2];
          continue;
        }

        parsed.sections[currentSection].push(line);
      }

      for (const key in parsed.sections) {
        parsed.sections[key] = parsed.sections[key].join('\n').trim();
      }

      const tableRegex = /\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)+)/g;
      let match;
      while ((match = tableRegex.exec(content)) !== null) {
        const headers = match[1].split('|').map(h => h.trim()).filter(h => h);
        const rowLines = match[2].trim().split('\n');
        const rows = rowLines.map(row => row.split('|').map(c => c.trim()).filter(c => c));
        parsed.tables.push({ headers, rows });
      }

      return parsed;
    }

    function getPreview(content, maxLength = 150) {
      let preview = content
        .replace(/^#+ .+$/gm, '')
        .replace(/\*\*(.+?):\*\*.*/g, '')
        .replace(/\|.+\|/g, '')
        .replace(/[-=]{3,}/g, '')
        .trim()
        .substring(0, maxLength);
      if (content.length > maxLength) preview += '...';
      return preview;
    }

    function getDisplayName(filename) {
      return filename
        .replace('.md', '')
        .split(/[-_]/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    // ===== SERVER MODE: live memory I/O via board-server.mjs =====
    async function loadMemoryFromServer() {
      try {
        const tree = await (await fetch('/api/memory/tree')).json();
        memoryData = { claudeMd: null, memoryFiles: [], memoryDirs: {} };
        const fetchFile = async (sp) =>
          (await fetch('/api/memory/file?path=' + encodeURIComponent(sp))).text();

        if (tree.claudeMd) {
          memoryData.claudeMd = { content: await fetchFile('CLAUDE.md'), serverPath: 'CLAUDE.md' };
        }
        for (const name of (tree.files || [])) {
          memoryData.memoryFiles.push({ name, content: await fetchFile('memory/' + name), serverPath: 'memory/' + name });
        }
        for (const [dir, files] of Object.entries(tree.dirs || {})) {
          memoryData.memoryDirs[dir] = [];
          for (const fname of files) {
            const sp = 'memory/' + dir + '/' + fname;
            const content = await fetchFile(sp);
            memoryData.memoryDirs[dir].push({ name: fname, content, serverPath: sp, parsed: parseMemoryMarkdown(content) });
          }
        }

        const hasAny = memoryData.claudeMd || memoryData.memoryFiles.length || Object.keys(memoryData.memoryDirs).length;
        if (!hasAny) return; // nothing yet — leave the empty state until memory exists
        renderMemory();
        memoryEmptyState.style.display = 'none';
        memoryMainContent.style.display = 'flex';
        if (activeMainTab === 'memory') filePathEl.textContent = '.tasks/ memory · live';
      } catch (e) { showStatus('Memory load failed: ' + e.message); }
    }

    async function saveMemoryToServer(serverPath, content) {
      await fetch('/api/memory/file?path=' + encodeURIComponent(serverPath), {
        method: 'POST', headers: { 'Content-Type': 'text/markdown' }, body: content,
      });
    }

    async function loadMemoryDirectory() {
      if (SERVER_MODE) { await loadMemoryFromServer(); return; }
      try {
        memoryDirHandle = await window.showDirectoryPicker();

        memoryData = { claudeMd: null, memoryFiles: [], memoryDirs: {} };

        try {
          const claudeFileHandle = await memoryDirHandle.getFileHandle('CLAUDE.md');
          const file = await claudeFileHandle.getFile();
          memoryData.claudeMd = { content: await file.text(), fileHandle: claudeFileHandle };
        } catch (e) { console.log('No CLAUDE.md found'); }

        try {
          const memoryDir = await memoryDirHandle.getDirectoryHandle('memory');
          for await (const entry of memoryDir.values()) {
            if (entry.kind === 'file' && entry.name.endsWith('.md')) {
              const file = await entry.getFile();
              memoryData.memoryFiles.push({
                name: entry.name,
                content: await file.text(),
                fileHandle: entry
              });
            } else if (entry.kind === 'directory') {
              memoryData.memoryDirs[entry.name] = [];
              const subDirHandle = entry;
              for await (const subEntry of subDirHandle.values()) {
                if (subEntry.kind === 'file' && subEntry.name.endsWith('.md')) {
                  const file = await subEntry.getFile();
                  const content = await file.text();
                  memoryData.memoryDirs[entry.name].push({
                    name: subEntry.name,
                    content: content,
                    fileHandle: subEntry,
                    dirHandle: subDirHandle,
                    parsed: parseMemoryMarkdown(content)
                  });
                }
              }
            }
          }
        } catch (e) { console.log('No memory/ directory found'); }

        renderMemory();
        memoryEmptyState.style.display = 'none';
        memoryMainContent.style.display = 'flex';
        filePathEl.textContent = memoryDirHandle.name;
        showStatus('Loaded memory from ' + memoryDirHandle.name);

      } catch (e) {
        if (e.name !== 'AbortError') { showStatus('Error: ' + e.message); }
      }
    }

    function renderMemory() {
      renderMemoryTabs();
      renderMemoryContent();
    }

    function renderMemoryTabs() {
      let html = '';

      if (memoryData.claudeMd) {
        html += `<button class="memory-tab active" data-tab="overview">Overview</button>`;
      }

      for (const file of memoryData.memoryFiles) {
        const name = file.name.replace('.md', '');
        html += `<button class="memory-tab${!memoryData.claudeMd && memoryData.memoryFiles[0] === file ? ' active' : ''}" data-tab="file-${name}">${name}</button>`;
      }

      for (const dirName of Object.keys(memoryData.memoryDirs).sort()) {
        const files = memoryData.memoryDirs[dirName];
        let count;
        if (dirName === 'context') {
          count = 0;
          for (const file of files) {
            const p = file.parsed;
            count += Object.keys(p.fields).length;
            for (const table of p.tables) {
              count += table.rows.length;
            }
            for (const [sName, sContent] of Object.entries(p.sections)) {
              if (sContent && sName !== '_intro') {
                count += sContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|')).length;
              }
            }
          }
        } else {
          count = files.length;
        }
        html += `<button class="memory-tab" data-tab="dir-${dirName}">${dirName} <span class="count">${count}</span></button>`;
      }

      memoryTabsContainer.innerHTML = html;

      memoryTabsContainer.querySelectorAll('.memory-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          memoryTabsContainer.querySelectorAll('.memory-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderMemoryContent();
        });
      });
    }

    function renderMemoryContent() {
      const activeTab = memoryTabsContainer.querySelector('.memory-tab.active');
      if (!activeTab) return;

      const tabId = activeTab.dataset.tab;

      if (tabId === 'overview') { renderMemoryOverview(); }
      else if (tabId.startsWith('file-')) {
        const fileName = tabId.replace('file-', '') + '.md';
        renderMemoryFile(fileName);
      } else if (tabId.startsWith('dir-')) {
        const dirName = tabId.replace('dir-', '');
        renderMemoryDirectory(dirName);
      }
    }

    function renderMemoryOverview() {
      if (!memoryData.claudeMd) return;

      let statsHtml = '<div class="stats">';
      for (const [dirName, files] of Object.entries(memoryData.memoryDirs)) {
        let count;
        if (dirName === 'context') {
          count = 0;
          for (const file of files) {
            const p = file.parsed;
            count += Object.keys(p.fields).length;
            for (const table of p.tables) { count += table.rows.length; }
            for (const [sName, sContent] of Object.entries(p.sections)) {
              if (sContent && sName !== '_intro') {
                count += sContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|')).length;
              }
            }
          }
        } else {
          count = files.length;
        }
        statsHtml += `
          <div class="stat">
            <div class="stat-value">${count}</div>
            <div class="stat-label">${dirName}</div>
          </div>
        `;
      }
      statsHtml += '</div>';

      const claudeContent = renderMarkdownToHtml(memoryData.claudeMd.content);

      memoryContentContainer.innerHTML = `
        ${statsHtml}
        <div class="file-card">
          <div class="file-card-header" onclick="this.nextElementSibling.classList.toggle('expanded'); this.querySelector('.toggle').textContent = this.nextElementSibling.classList.contains('expanded') ? '\u2212' : '+'">
            <span class="file-card-title">CLAUDE.md</span>
            <span class="toggle" style="color: var(--text-muted);">&minus;</span>
          </div>
          <div class="file-card-content expanded markdown-content">${claudeContent}</div>
        </div>
        <button onclick="openEditModal('CLAUDE.md', 'claudeMd')" style="margin-top: 10px;">Edit CLAUDE.md</button>
      `;
    }

    function renderMemoryFile(fileName) {
      const file = memoryData.memoryFiles.find(f => f.name === fileName);
      if (!file) return;

      const content = renderMarkdownToHtml(file.content);

      memoryContentContainer.innerHTML = `
        <div class="file-card">
          <div class="file-card-header">
            <span class="file-card-title">${fileName}</span>
          </div>
          <div class="file-card-content expanded markdown-content">${content}</div>
        </div>
        <button onclick="openEditModal('${fileName}', 'memoryFile')" style="margin-top: 10px;">Edit ${fileName}</button>
      `;
    }

    function renderMemoryDirectory(dirName) {
      const files = memoryData.memoryDirs[dirName] || [];

      // Context directory uses flat list view
      if (dirName === 'context') {
        renderMemoryDirectoryFlat(dirName, files);
        return;
      }

      // All other directories use card grid view
      let html = `
        <div class="search-box">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search ${dirName}..." id="dirSearch" oninput="filterMemoryDirectory('${dirName}', this.value)">
        </div>
        <div class="memory-grid" id="dirGrid">
      `;

      for (const file of files) {
        const p = file.parsed;
        const title = p.title || getDisplayName(file.name);

        let fieldsHtml = '';
        const fieldEntries = Object.entries(p.fields).slice(0, 3);
        if (fieldEntries.length > 0) {
          fieldsHtml = '<div class="memory-card-fields">';
          for (const [key, value] of fieldEntries) {
            fieldsHtml += `
              <div class="memory-card-field">
                <span class="memory-card-field-label">${escapeHtml(key)}</span>
                <span class="memory-card-field-value">${escapeHtml(value)}</span>
              </div>
            `;
          }
          fieldsHtml += '</div>';
        }

        let preview = '';
        for (const [sectionName, sectionContent] of Object.entries(p.sections)) {
          if (sectionContent && sectionName !== '_intro') {
            preview = getPreview(sectionContent, 100);
            break;
          }
        }
        if (!preview) preview = getPreview(p.rawContent, 100);

        html += `
          <div class="memory-card" onclick="openFileModal('${dirName}', '${file.name}')" data-search="${escapeHtml((title + ' ' + JSON.stringify(p.fields) + ' ' + p.rawContent).toLowerCase())}">
            <div class="memory-card-title">${escapeHtml(title)}</div>
            ${fieldsHtml}
            <div class="memory-card-preview">${escapeHtml(preview)}</div>
          </div>
        `;
      }

      html += `
        <div class="add-btn" onclick="openNewFileModal('${dirName}')">
          + Add to ${dirName}
        </div>
      </div>`;

      memoryContentContainer.innerHTML = html;
    }

    function renderMemoryDirectoryFlat(dirName, files) {
      let html = `
        <div class="search-box">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search ${dirName}..." id="dirSearch" oninput="filterMemoryDirectory('${dirName}', this.value)">
        </div>
        <div id="dirGrid">
      `;

      for (const file of files) {
        const p = file.parsed;

        // Render fields as a key-value table
        const fieldEntries = Object.entries(p.fields);
        if (fieldEntries.length > 0) {
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><tbody>`;
          for (const [key, value] of fieldEntries) {
            html += `<tr data-search="${escapeHtml((key + ' ' + value).toLowerCase())}"><td>${escapeHtml(key)}</td><td>${escapeHtml(value)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Render parsed tables (teams, tools, etc.) as proper HTML tables
        for (const table of p.tables) {
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><thead><tr>`;
          for (const h of table.headers) {
            html += `<th>${escapeHtml(h)}</th>`;
          }
          html += `</tr></thead><tbody>`;
          for (const row of table.rows) {
            const searchData = row.join(' ').toLowerCase();
            html += `<tr data-search="${escapeHtml(searchData)}">`;
            for (const cell of row) {
              html += `<td>${escapeHtml(cell)}</td>`;
            }
            html += `</tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Render non-table section content as list items
        for (const [sectionName, sectionContent] of Object.entries(p.sections)) {
          if (!sectionContent || sectionName === '_intro') continue;
          const lines = sectionContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|'));
          if (lines.length === 0) continue;
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><thead><tr><th colspan="2">${escapeHtml(sectionName)}</th></tr></thead><tbody>`;
          for (const line of lines) {
            const cleanLine = line.replace(/^[-*]\s*/, '').replace(/\*\*(.+?)\*\*/g, '$1').trim();
            if (!cleanLine) continue;
            html += `<tr data-search="${escapeHtml((sectionName + ' ' + cleanLine).toLowerCase())}"><td colspan="2">${escapeHtml(cleanLine)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }
      }

      html += `</div>`;
      memoryContentContainer.innerHTML = html;
    }

    function filterMemoryDirectory(dirName, searchTerm) {
      const grid = document.getElementById('dirGrid');
      const items = grid.querySelectorAll('.memory-card, tr[data-search]');
      const search = searchTerm.toLowerCase();
      items.forEach(item => {
        const searchData = item.dataset.search || '';
        item.style.display = (!search || searchData.includes(search)) ? '' : 'none';
      });
    }

    function renderMarkdownToHtml(md) {
      let html = escapeHtml(md);

      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/```[\s\S]*?```/g, match => {
        const code = match.replace(/```\w*\n?/g, '');
        return '<pre><code>' + code + '</code></pre>';
      });
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/(\|.+\|\n\|[-| ]+\|\n(?:\|.+\|\n?)+)/g, match => {
        const lines = match.trim().split('\n');
        const headers = lines[0].split('|').filter(c => c.trim());
        const rows = lines.slice(2).map(row => row.split('|').filter(c => c.trim()));
        let table = '<table><thead><tr>';
        headers.forEach(h => table += `<th>${h.trim()}</th>`);
        table += '</tr></thead><tbody>';
        rows.forEach(row => {
          table += '<tr>';
          row.forEach(cell => table += `<td>${cell.trim()}</td>`);
          table += '</tr>';
        });
        table += '</tbody></table>';
        return table;
      });
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      html = html.replace(/^(?!<[hupol]|<li|<table|<pre)(.+)$/gm, '<p>$1</p>');
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>\s*<\/p>/g, '');

      return html;
    }

    // Modal functions
    function openFileModal(dirName, fileName) {
      const files = memoryData.memoryDirs[dirName];
      const file = files.find(f => f.name === fileName);
      if (!file) return;

      document.getElementById('modalTitle').textContent = getDisplayName(fileName);
      document.getElementById('modalBody').innerHTML = `
        <div class="markdown-content" style="margin-bottom: 20px;">
          ${renderMarkdownToHtml(file.content)}
        </div>
        <div class="form-group">
          <label>Edit Raw Markdown</label>
          <textarea id="editContent">${escapeHtml(file.content)}</textarea>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = 'dirFile';
      modalOverlay.dataset.dirName = dirName;
      modalOverlay.dataset.fileName = fileName;
    }

    function openNewFileModal(dirName) {
      document.getElementById('modalTitle').textContent = `Add to ${dirName}`;

      let template = '# New Entry\n\n';
      const existingFiles = memoryData.memoryDirs[dirName];
      if (existingFiles && existingFiles.length > 0) {
        const sample = existingFiles[0].parsed;
        for (const key of Object.keys(sample.fields)) {
          template += `**${key}:** \n`;
        }
        template += '\n';
        for (const section of Object.keys(sample.sections)) {
          if (section !== '_intro') {
            template += `## ${section}\n\n`;
          }
        }
      }

      document.getElementById('modalBody').innerHTML = `
        <div class="form-group">
          <label>Filename (without .md)</label>
          <input type="text" id="newFileName" placeholder="my-new-entry" style="width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text-primary); font-size: 14px; font-family: inherit; margin-bottom: 16px;">
        </div>
        <div class="form-group">
          <label>Content</label>
          <textarea id="editContent">${escapeHtml(template)}</textarea>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = 'newDirFile';
      modalOverlay.dataset.dirName = dirName;
    }

    function openEditModal(fileName, type) {
      let content = '';
      if (type === 'claudeMd') {
        content = memoryData.claudeMd.content;
      } else if (type === 'memoryFile') {
        const file = memoryData.memoryFiles.find(f => f.name === fileName);
        if (file) content = file.content;
      }

      document.getElementById('modalTitle').textContent = `Edit ${fileName}`;
      document.getElementById('modalBody').innerHTML = `
        <div class="form-group">
          <label>Content</label>
          <textarea id="editContent" style="min-height: 400px;">${escapeHtml(content)}</textarea>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = type;
      modalOverlay.dataset.fileName = fileName;
    }

    function closeModal() {
      modalOverlay.classList.remove('visible');
    }

    async function saveModal() {
      const type = modalOverlay.dataset.type;
      const content = document.getElementById('editContent').value;

      try {
        if (type === 'claudeMd') {
          memoryData.claudeMd.content = content;
          if (SERVER_MODE) {
            await saveMemoryToServer(memoryData.claudeMd.serverPath, content);
          } else {
            const writable = await memoryData.claudeMd.fileHandle.createWritable();
            await writable.write(content);
            await writable.close();
          }
          showStatus('Saved CLAUDE.md');

        } else if (type === 'memoryFile') {
          const fileName = modalOverlay.dataset.fileName;
          const file = memoryData.memoryFiles.find(f => f.name === fileName);
          if (file) {
            file.content = content;
            if (SERVER_MODE) {
              await saveMemoryToServer(file.serverPath, content);
            } else {
              const writable = await file.fileHandle.createWritable();
              await writable.write(content);
              await writable.close();
            }
            showStatus('Saved ' + fileName);
          }

        } else if (type === 'dirFile') {
          const dirName = modalOverlay.dataset.dirName;
          const fileName = modalOverlay.dataset.fileName;
          const files = memoryData.memoryDirs[dirName];
          const file = files.find(f => f.name === fileName);
          if (file) {
            file.content = content;
            file.parsed = parseMemoryMarkdown(content);
            if (SERVER_MODE) {
              await saveMemoryToServer(file.serverPath, content);
            } else {
              const writable = await file.fileHandle.createWritable();
              await writable.write(content);
              await writable.close();
            }
            showStatus('Saved ' + fileName);
          }

        } else if (type === 'newDirFile') {
          const dirName = modalOverlay.dataset.dirName;
          let fileName = document.getElementById('newFileName').value.trim();
          if (!fileName) { showStatus('Please enter a filename'); return; }
          if (!fileName.endsWith('.md')) fileName += '.md';

          if (SERVER_MODE) {
            const sp = 'memory/' + dirName + '/' + fileName;
            await saveMemoryToServer(sp, content);
            memoryData.memoryDirs[dirName].push({
              name: fileName,
              content: content,
              serverPath: sp,
              parsed: parseMemoryMarkdown(content)
            });
          } else {
            const memoryDir = await memoryDirHandle.getDirectoryHandle('memory');
            const subDir = await memoryDir.getDirectoryHandle(dirName, { create: true });
            const fileHandle = await subDir.getFileHandle(fileName, { create: true });

            const writable = await fileHandle.createWritable();
            await writable.write(content);
            await writable.close();

            memoryData.memoryDirs[dirName].push({
              name: fileName,
              content: content,
              fileHandle: fileHandle,
              dirHandle: subDir,
              parsed: parseMemoryMarkdown(content)
            });
          }

          showStatus('Created ' + fileName);
        }

        closeModal();
        renderMemory();

      } catch (e) {
        showStatus('Error saving: ' + e.message);
      }
    }

    // ============================================================
    // ===== TASK MODAL (rich view + edit) — v0.22.0 =====
    // ============================================================
    // Clicking a card opens this modal; ALL task editing happens here (title, note,
    // description, subtasks, prerequisites, column, done, delete). The rich per-task
    // description + activity log live in a server-side file (.tasks/tasks/<id>.md) fetched
    // on open and saved via /api/task — server mode only (file:// has nowhere to write it).
    const taskModalOverlay = document.getElementById('taskModalOverlay');
    const tmTitleEl = document.getElementById('tmTitle');
    const tmIdEl = document.getElementById('tmId');
    const tmCheckboxEl = document.getElementById('tmCheckbox');
    const tmBodyEl = document.getElementById('tmBody');

    let tmTask = null;                       // live ref into `tasks` for the open card
    let tmDetail = { description: '', activity: [] };
    let tmDescEditing = false;
    let tmDescDirty = false;

    function nowStamp() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    // A detail file = a TT;DR-led markdown description, optionally followed by a
    // "## Activity" section the agent appends one-line entries to.
    function splitDetail(text) {
      const m = (text || '').match(/^##\s+Activity\s*$/im);
      if (!m) return { description: (text || '').trim(), activity: [] };
      const description = text.slice(0, m.index).trim();
      const activity = text.slice(m.index + m[0].length)
        .split('\n').map(l => l.trim())
        .filter(l => l.startsWith('- ')).map(l => l.replace(/^-\s+/, ''));
      return { description, activity };
    }
    function joinDetail(description, activity) {
      let out = (description || '').trim();
      if (activity && activity.length) out += '\n\n## Activity\n' + activity.map(a => '- ' + a).join('\n');
      return out.trim() + '\n';
    }

    // Minimal, dependency-free markdown → HTML for the description pane: TT;DR callout,
    // #/##/### headings, -, * and 1. lists, **bold**, _italic_, `code`, ```fences```,
    // [links](url). Everything is escaped before any tag is introduced.
    function renderTaskMarkdown(md) {
      if (!md || !md.trim()) {
        return '<p style="color: var(--text-muted); font-style: italic;">No description yet. Click <strong>Edit</strong> to add a plan — lead with a one-glance <code>TT;DR:</code> summary.</p>';
      }
      const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const inline = (s) => esc(s)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
        .replace(/(^|[^_\w])_([^_\n]+)_/g, '$1<em>$2</em>')
        .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      const lines = md.replace(/\r\n/g, '\n').split('\n');
      let html = '', inList = false, listTag = 'ul', inCode = false, code = '';
      const closeList = () => { if (inList) { html += `</${listTag}>`; inList = false; } };
      for (const raw of lines) {
        if (/^\s*```/.test(raw)) {
          if (inCode) { html += `<pre><code>${esc(code)}</code></pre>`; inCode = false; code = ''; }
          else { closeList(); inCode = true; code = ''; }
          continue;
        }
        if (inCode) { code += raw + '\n'; continue; }
        const ttdr = raw.match(/^\s*TT;DR:\s*(.*)$/i);
        if (ttdr) { closeList(); html += `<div class="tm-ttdr"><strong>TT;DR:</strong> ${inline(ttdr[1])}</div>`; continue; }
        let m;
        if (m = raw.match(/^###\s+(.*)$/)) { closeList(); html += `<h4>${inline(m[1])}</h4>`; }
        else if (m = raw.match(/^##\s+(.*)$/)) { closeList(); html += `<h3>${inline(m[1])}</h3>`; }
        else if (m = raw.match(/^#\s+(.*)$/)) { closeList(); html += `<h2>${inline(m[1])}</h2>`; }
        else if (m = raw.match(/^\s*[-*]\s+(.*)$/)) {
          if (!inList || listTag !== 'ul') { closeList(); html += '<ul>'; inList = true; listTag = 'ul'; }
          html += `<li>${inline(m[1])}</li>`;
        } else if (m = raw.match(/^\s*\d+\.\s+(.*)$/)) {
          if (!inList || listTag !== 'ol') { closeList(); html += '<ol>'; inList = true; listTag = 'ol'; }
          html += `<li>${inline(m[1])}</li>`;
        } else if (/^\s*$/.test(raw)) { closeList(); }
        else { closeList(); html += `<p>${inline(raw)}</p>`; }
      }
      if (inCode) html += `<pre><code>${esc(code)}</code></pre>`;
      closeList();
      return html;
    }

    async function openTaskModal(task) {
      tmTask = task;
      tmDescEditing = false;
      tmDescDirty = false;
      tmDetail = { description: '', activity: [] };
      tmTitleEl.value = task.title;
      tmIdEl.textContent = '#' + task.id;
      tmCheckboxEl.className = 'checkbox ' + (task.checked ? 'checked' : '');
      taskModalOverlay.classList.add('visible');
      renderTaskModalBody();
      if (SERVER_MODE) {
        try {
          const res = await fetch('/api/task?id=' + encodeURIComponent(task.id));
          tmDetail = splitDetail(await res.text());
        } catch (_) { tmDetail = { description: '', activity: [] }; }
        if (tmTask === task) renderTaskModalBody();
      }
    }

    function closeTaskModal() {
      if (tmDescEditing && tmDescDirty && !confirm('Discard unsaved description edits?')) return;
      taskModalOverlay.classList.remove('visible');
      tmTask = null;
      tmDescEditing = false;
      tmDescDirty = false;
    }

    // Persist the per-task detail file (description + activity). Server mode only.
    async function saveTaskDetail(activityNote) {
      if (!SERVER_MODE || !tmTask) return;
      if (activityNote) tmDetail.activity.push(`${nowStamp()} — ${activityNote}`);
      try {
        await fetch('/api/task?id=' + encodeURIComponent(tmTask.id), {
          method: 'POST',
          headers: { 'Content-Type': 'text/markdown' },
          body: joinDetail(tmDetail.description, tmDetail.activity),
        });
        markBoardUpdated();
      } catch (e) { showStatus('Detail save failed: ' + e.message); }
    }

    function renderTaskModalBody() {
      const task = tmTask;
      if (!task) return;

      const sectionOptions = sections.map(s =>
        `<option value="${s.id}"${s.id === task.section ? ' selected' : ''}>${escapeHtml(s.name)}</option>`).join('');
      const unmet = unmetNeeds(task);
      const blockedLine = unmet.length
        ? `<div class="tm-blocked">🔒 Blocked — waiting on ${unmet.map(id => {
            const t = taskById(id);
            return '#' + id + (t ? ' (' + escapeHtml(t.title) + ')' : '');
          }).join(', ')}</div>`
        : '';
      const needsStr = (task.needs || []).map(n => '#' + n).join(', ');
      const liveOnly = ' <span style="text-transform:none; letter-spacing:0; color:var(--text-muted); font-weight:normal;">— live board only</span>';

      tmBodyEl.innerHTML = `
        <div class="tm-section-label">Column</div>
        <select id="tmSection" class="tm-note-input">${sectionOptions}</select>

        <div class="tm-section-label">Note <span style="text-transform:none; letter-spacing:0; color:var(--text-muted); font-weight:normal;">— one-line context</span></div>
        <input type="text" id="tmNote" class="tm-note-input" placeholder="Short context (one line)" value="${escapeHtml(task.note || '')}">

        <div class="tm-section-label">Prerequisites <span style="text-transform:none; letter-spacing:0; color:var(--text-muted); font-weight:normal;">— task ids, comma-separated</span></div>
        <input type="text" id="tmNeeds" class="tm-note-input" placeholder="#a3f, #k2p" value="${escapeHtml(needsStr)}">
        ${blockedLine}

        <div class="tm-section-label tm-row-between"><span>Description${SERVER_MODE ? '' : liveOnly}</span>${SERVER_MODE ? `<button class="tm-btn" id="tmDescToggle">${tmDescEditing ? 'Preview' : 'Edit'}</button>` : ''}</div>
        <div id="tmDescArea"></div>

        <div class="tm-section-label">Subtasks</div>
        <div id="tmSubtasks"></div>

        <div class="tm-section-label">Activity</div>
        <ul class="tm-activity" id="tmActivity"></ul>
      `;

      renderTmDesc();
      renderTmSubtasks();
      renderTmActivity();

      const secSel = document.getElementById('tmSection');
      secSel.addEventListener('change', () => {
        const to = secSel.value;
        if (to !== task.section) {
          moveTask(task.id, to);            // honours the Active-block gate; sets task.section on success
          secSel.value = task.section;      // reflect reality (revert if the move was refused)
          tmCheckboxEl.className = 'checkbox ' + (task.checked ? 'checked' : '');
        }
      });

      const noteInput = document.getElementById('tmNote');
      noteInput.addEventListener('change', () => {
        const v = noteInput.value.trim();
        if (v !== (task.note || '')) { task.note = v; commitBoard(); }
      });

      const needsInput = document.getElementById('tmNeeds');
      needsInput.addEventListener('change', () => {
        const ids = [...new Set((needsInput.value.match(/[0-9a-z]{2,}/gi) || [])
          .map(s => s.toLowerCase()).filter(id => id !== task.id))];   // no self-dependency
        if (JSON.stringify(ids) !== JSON.stringify(task.needs || [])) {
          task.needs = ids;
          commitBoard();
          renderTaskModalBody();             // refresh the blocked-line
        }
      });
    }

    function renderTmDesc() {
      const area = document.getElementById('tmDescArea');
      if (!area) return;
      // The header Edit/Preview toggle only governs entry into edit mode; while editing, the
      // in-area Cancel/Save buttons govern exit, so hide the header toggle to avoid a dead,
      // mislabeled control.
      const toggle = document.getElementById('tmDescToggle');
      if (toggle) toggle.style.display = tmDescEditing ? 'none' : '';
      if (tmDescEditing) {
        area.innerHTML = '';
        const ta = document.createElement('textarea');
        ta.className = 'tm-desc-edit';
        ta.value = tmDetail.description || '';
        ta.placeholder = 'TT;DR: one or two plain-English sentences on what this task is and where it stands.\n\nThen the full plan: what to build, which files/areas to touch, edge cases, acceptance criteria…';
        ta.addEventListener('input', () => { tmDescDirty = true; });
        area.appendChild(ta);
        const actions = document.createElement('div');
        actions.style.cssText = 'display:flex; gap:8px; margin-top:8px; justify-content:flex-end;';
        actions.innerHTML = '<button class="tm-btn" id="tmDescCancel">Cancel</button><button class="tm-btn" id="tmDescSave" style="border-color:var(--accent); color:var(--accent);">Save description</button>';
        area.appendChild(actions);
        ta.focus();
        document.getElementById('tmDescCancel').addEventListener('click', () => {
          tmDescEditing = false; tmDescDirty = false; renderTaskModalBody();
        });
        document.getElementById('tmDescSave').addEventListener('click', async () => {
          tmDetail.description = ta.value;
          tmDescEditing = false; tmDescDirty = false;
          await saveTaskDetail('description edited (operator)');
          renderTaskModalBody();
          showStatus('Description saved');
        });
      } else {
        area.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'tm-desc-rendered';
        div.innerHTML = renderTaskMarkdown(tmDetail.description);
        area.appendChild(div);
        if (toggle) toggle.onclick = () => { tmDescEditing = true; renderTmDesc(); };
      }
    }

    function renderTmSubtasks() {
      const wrap = document.getElementById('tmSubtasks');
      if (!wrap || !tmTask) return;
      wrap.innerHTML = '';
      (tmTask.subtasks || []).forEach((st, idx) => {
        const row = document.createElement('div');
        row.className = 'tm-sub';
        const cb = document.createElement('span');
        cb.className = 'checkbox ' + (st.checked ? 'checked' : '');
        cb.style.flexShrink = '0';
        cb.addEventListener('click', () => { st.checked = !st.checked; commitBoard(); renderTmSubtasks(); });
        const txt = document.createElement('input');
        txt.type = 'text';
        txt.className = 'tm-sub-text' + (st.checked ? ' checked' : '');
        txt.value = st.text;
        txt.addEventListener('change', () => {
          const v = txt.value.trim();
          if (!v) { tmTask.subtasks.splice(idx, 1); commitBoard(); renderTmSubtasks(); }
          else if (v !== st.text) { st.text = v; commitBoard(); }
        });
        const del = document.createElement('button');
        del.className = 'tm-sub-del';
        del.title = 'Remove subtask';
        del.textContent = '×';
        del.addEventListener('click', () => { tmTask.subtasks.splice(idx, 1); commitBoard(); renderTmSubtasks(); });
        const desc = document.createElement('textarea');
        desc.className = 'tm-sub-desc';
        desc.placeholder = 'Subtask description or handoff note...';
        desc.value = st.description || '';
        desc.addEventListener('change', () => {
          const v = desc.value.trim();
          if (v !== (st.description || '')) { st.description = v; commitBoard(); }
        });
        row.appendChild(cb); row.appendChild(txt); row.appendChild(del); row.appendChild(desc);
        wrap.appendChild(row);
      });
      const add = document.createElement('div');
      add.className = 'tm-add';
      add.textContent = '+ Add subtask';
      add.addEventListener('click', () => {
        const row = document.createElement('div');
        row.className = 'tm-sub';
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'tm-sub-text';
        input.placeholder = 'New subtask…';
        input.style.gridColumn = '1 / 4';
        let committed = false;
        const commit = () => {
          if (committed) return; committed = true;
          const v = input.value.trim();
          if (v) { if (!tmTask.subtasks) tmTask.subtasks = []; tmTask.subtasks.push({ text: v, checked: false, description: '' }); commitBoard(); }
          renderTmSubtasks();
        };
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
          else if (e.key === 'Escape') { committed = true; renderTmSubtasks(); }
        });
        input.addEventListener('blur', commit);
        row.appendChild(input);
        wrap.insertBefore(row, add);
        input.focus();
      });
      wrap.appendChild(add);
    }

    function renderTmActivity() {
      const ul = document.getElementById('tmActivity');
      if (!ul) return;
      ul.innerHTML = '';
      if (!tmDetail.activity || !tmDetail.activity.length) {
        const li = document.createElement('li');
        li.className = 'tm-empty';
        li.textContent = SERVER_MODE
          ? 'No recorded activity yet — agents append a line here as they work.'
          : 'Activity log is available on the live board.';
        ul.appendChild(li);
        return;
      }
      [...tmDetail.activity].reverse().forEach(a => {   // newest first
        const li = document.createElement('li');
        li.textContent = a;
        ul.appendChild(li);
      });
    }

    // A board mutation made inside the modal: autosave TASKS.md + re-render (with FLIP),
    // and keep the modal header checkbox in sync.
    function commitBoard() {
      markChanged();
      renderTasks();
      if (tmTask) tmCheckboxEl.className = 'checkbox ' + (tmTask.checked ? 'checked' : '');
    }

    tmCheckboxEl.addEventListener('click', () => {
      if (!tmTask) return;
      if (!tmTask.checked) {
        const unmet = unmetNeeds(tmTask);
        if (unmet.length) {
          showStatus(`Blocked — finish ${unmet.map(id => '#' + id).join(', ')} before marking done`);
          return;
        }
        if (openSubtasks(tmTask).length) {
          showStatus('Blocked — finish or remove open subtasks before marking done');
          return;
        }
      }
      tmTask.checked = !tmTask.checked;
      commitBoard();
    });
    tmTitleEl.addEventListener('change', () => {
      if (!tmTask) return;
      const v = tmTitleEl.value.trim();
      if (v && v !== tmTask.title) { tmTask.title = v; commitBoard(); }
      else tmTitleEl.value = tmTask.title;
    });
    document.getElementById('tmClose').addEventListener('click', closeTaskModal);
    document.getElementById('tmDoneBtn').addEventListener('click', closeTaskModal);
    document.getElementById('tmDelete').addEventListener('click', () => {
      if (!tmTask) return;
      const t = tmTask;
      taskModalOverlay.classList.remove('visible');
      tmTask = null;
      deleteTask(t);
    });
    taskModalOverlay.addEventListener('click', (e) => { if (e.target === taskModalOverlay) closeTaskModal(); });

    // ============================================================
    // ===== FRESHNESS INDICATOR ("live" → seconds → "stale") =====
    // ============================================================
    // One 1/sec interval compares now against the last board update. < 2min → "live";
    // 2min..45min → counts up in seconds; ≥ 45min → "stale". Cheap: a single timer plus a
    // couple of class swaps — nothing per-card.
    let lastBoardUpdate = Date.now();
    let freshnessEl = null;
    let freshSlot = null;
    let lastFreshText = '';
    const FRESH_WINDOW_MS = 120000;        // 2 min "live"
    const STALE_AFTER_MS = 45 * 60000;     // 45 min → stale

    function markBoardUpdated() { lastBoardUpdate = Date.now(); updateFreshness(); }

    function updateFreshness() {
      if (!freshnessEl) return;
      const elapsed = Date.now() - lastBoardUpdate;
      let text, cls, title;
      if (elapsed < FRESH_WINDOW_MS) {
        text = 'live'; cls = 'fresh'; title = 'Board updated within the last 2 minutes';
      } else if (elapsed < STALE_AFTER_MS) {
        text = Math.floor(elapsed / 1000) + 's'; cls = 'aging'; title = 'Seconds since the last board change';
      } else {
        text = 'stale'; cls = 'stale'; title = 'No board changes in 45+ minutes — may be out of sync';
      }
      freshnessEl.classList.remove('fresh', 'aging', 'stale');
      freshnessEl.classList.add(cls);
      freshnessEl.title = title;
      if (text !== lastFreshText) {
        lastFreshText = text;
        if (freshSlot) freshSlot.set(text, { color: null });   // quiet odometer roll (no arrival flash)
        else freshnessEl.textContent = text;
      }
    }

    function startFreshnessClock() {
      if (!freshnessEl) {
        freshnessEl = document.createElement('span');
        freshnessEl.id = 'freshness';
        freshnessEl.style.marginLeft = '8px';
        freshnessEl.classList.add('fresh');
        if (filePathEl && filePathEl.parentElement) {
          filePathEl.parentElement.insertBefore(freshnessEl, filePathEl.nextSibling);
        } else {
          document.body.appendChild(freshnessEl);
        }
        freshSlot = attachSlotText(freshnessEl, 'live', { color: null });
        lastFreshText = 'live';
      }
      updateFreshness();
      setInterval(updateFreshness, 1000);
    }

    // ============================================================
    // ===== SLOT ROLL — short labels that change in place =====
    // ============================================================
    // Vanilla port of the QubeTX "slot roll" (DESIGN_SYSTEM § Slot roll), itself adapted
    // from slot-text v0.2.2 (MIT · textmotion.dev). Each character sits in its own clipped
    // cell; the new glyph rolls in while the old rolls out, landing with a small spring.
    // Themed for SHAUGHV: arrival flash is var(--accent) settling to ink (pass color:null for a
    // quiet odometer roll). Used on the column count badges (accent flash when a task moves) and
    // the freshness counter (quiet ticks). Respects prefers-reduced-motion — it snaps to the final
    // value. The per-glyph roll runs through a driver seam: when anime.js has loaded (full/vendor
    // tier) it drives the transform/rotate/color from the SAME computed tuple; otherwise the
    // built-in CSS-transition driver runs — identical motion, zero deps. FLIP stays on WAAPI.
    const SLOT_EASE = 'cubic-bezier(0.34, 1.56, 0.64, 1)';
    const SLOT_DEFAULTS = {
      direction: 'down', stagger: 40, duration: 240, exitOffset: 50, easing: SLOT_EASE,
      bounce: 0.3, color: 'var(--accent)', colorFade: 280, skipUnchanged: true, interrupt: true,
    };
    const SLOT_NBSP = ' ';
    const slotGlyph = (c) => (c === ' ' ? SLOT_NBSP : c);
    const slotStates = new WeakMap();

    function slotStyleContainer(el) {
      el.setAttribute('data-slot-text', '');
      el.style.display = 'inline-flex';
      el.style.whiteSpace = 'pre';
    }
    function slotMakeSr(text) {
      const sr = document.createElement('span');
      sr.setAttribute('data-slot-sr', '');
      Object.assign(sr.style, { position: 'absolute', width: '1px', height: '1px', overflow: 'hidden', clip: 'rect(0 0 0 0)', clipPath: 'inset(50%)', whiteSpace: 'nowrap' });
      sr.textContent = text;
      return sr;
    }
    function slotMakeFace(char) {
      const face = document.createElement('span');
      face.setAttribute('data-slot-face', '');
      Object.assign(face.style, { position: 'absolute', inset: '0', display: 'flex', alignItems: 'center', justifyContent: 'center', whiteSpace: 'pre' });
      face.textContent = slotGlyph(char);
      return face;
    }
    function slotBuildCell(char) {
      const slot = document.createElement('span');
      slot.setAttribute('data-slot-cell', '');
      slot.dataset.char = char;
      Object.assign(slot.style, { position: 'relative', display: 'inline-flex', flex: 'none', justifyContent: 'center', overflowX: 'visible', overflowY: 'clip', verticalAlign: 'bottom' });
      const sizer = document.createElement('span');
      sizer.setAttribute('data-slot-sizer', '');
      Object.assign(sizer.style, { visibility: 'hidden', whiteSpace: 'pre' });
      sizer.textContent = slotGlyph(char);
      slot.append(sizer, slotMakeFace(char));
      return slot;
    }
    function slotSettle(container) {
      const state = slotStates.get(container);
      if (!state) return;
      state.timers.forEach((t) => clearTimeout(t));
      slotStates.delete(container);
      buildSlotText(container, state.target);
    }
    function buildSlotText(container, text) {
      slotStyleContainer(container);
      const cells = Array.from(text, slotBuildCell);
      cells.forEach((c) => c.setAttribute('aria-hidden', 'true'));
      container.replaceChildren(slotMakeSr(text), ...cells);
    }
    // Driver seam — the per-glyph roll is computed into a backend-agnostic tuple, then APPLIED by
    // one of two drivers. anime.js (when loaded) and the built-in CSS-transition driver receive the
    // exact same numbers, so the motion is identical and "which library loaded" is invisible. We
    // re-check window.anime per call so a late-arriving anime.js is picked up without a reload.
    function slotUseAnime() { return typeof window !== 'undefined' && typeof window.anime === 'function'; }
    function animeEase(cssEasing) {
      const m = /cubic-bezier\(\s*([\d.+-]+)\s*,\s*([\d.+-]+)\s*,\s*([\d.+-]+)\s*,\s*([\d.+-]+)\s*\)/.exec(cssEasing || '');
      return m ? `cubicBezier(${m[1]}, ${m[2]}, ${m[3]}, ${m[4]})` : 'easeOutQuad';
    }
    // CSS driver: the original transform/rotate transitions + color fade, completion via
    // transitionend. This is the reference behaviour and the always-correct default.
    function slotDriveCss(roll, ctx) {
      const { oldFace, newFace, finishGlyph, timers } = ctx;
      const rollTrans = `transform ${roll.duration}ms ${roll.easing}`;
      const trans = roll.restColor != null ? `${rollTrans}, color ${roll.colorFade}ms linear ${roll.duration}ms` : rollTrans;
      if (oldFace) {
        timers.push(setTimeout(() => {
          oldFace.style.willChange = 'transform';
          oldFace.style.transition = rollTrans;
          oldFace.style.transform = `translateY(${roll.outY}px) rotate(${-Number(roll.tilt)}deg)`;
        }, roll.outDelay));
      }
      timers.push(setTimeout(() => {
        newFace.style.transition = trans;
        newFace.style.transform = 'translateY(0) rotate(0deg)';
        if (roll.restColor != null) newFace.style.color = roll.restColor;
        const done = (e) => {
          if (e.propertyName !== 'transform') return;
          newFace.removeEventListener('transitionend', done);
          finishGlyph();
        };
        newFace.addEventListener('transitionend', done);
      }, roll.inDelay));
    }
    // anime.js driver: same translateY/rotate endpoints, duration, delay and easing curve, fed to
    // anime() instead of CSS transitions. Completion fires finishGlyph (parity with transitionend).
    function slotDriveAnime(roll, ctx) {
      const { oldFace, newFace, finishGlyph, timers } = ctx;
      const ease = animeEase(roll.easing);
      if (oldFace) {
        oldFace.style.willChange = 'transform';
        window.anime({ targets: oldFace, translateY: [0, roll.outY], rotate: [0, -Number(roll.tilt)],
          duration: roll.duration, delay: roll.outDelay, easing: ease });
      }
      newFace.style.willChange = 'transform';
      window.anime({ targets: newFace, translateY: [roll.inStart, 0], rotate: [Number(roll.tilt), 0],
        duration: roll.duration, delay: roll.inDelay, easing: ease, complete: finishGlyph });
      if (roll.restColor != null && roll.tint != null) {
        window.anime({ targets: newFace, color: [roll.tint, roll.restColor],
          duration: roll.colorFade, delay: roll.inDelay + roll.duration, easing: 'linear' });
      }
    }
    function animateSlotText(container, toText, options = {}) {
      const { direction, stagger, duration, exitOffset, easing, bounce, color, colorFade, skipUnchanged, interrupt } = { ...SLOT_DEFAULTS, ...options };
      if (prefersReducedMotion) { slotSettle(container); buildSlotText(container, toText); return; }
      const running = slotStates.get(container);
      if (running && !interrupt) {
        if (toText !== running.target) running.pending = { text: toText, options };
        return;
      }
      slotSettle(container);
      if (!container.querySelector('[data-slot-cell]')) { buildSlotText(container, toText); return; }
      slotStyleContainer(container);
      const sr = container.querySelector('[data-slot-sr]');
      if (sr) sr.textContent = toText;
      const slots = Array.from(container.querySelectorAll('[data-slot-cell]'));
      const fromText = slots.map((s) => s.dataset.char || '').join('');
      if (!interrupt && fromText === toText) return;
      const maxLen = Math.max(fromText.length, toText.length);
      const sample = slots.find((s) => (s.dataset.char || '') !== '') || slots[0];
      const cs = getComputedStyle(container);
      const H = Math.ceil(
        (sample && sample.getBoundingClientRect().height) || (sample && sample.offsetHeight) ||
        container.getBoundingClientRect().height || parseFloat(cs.lineHeight) || 0
      ) || Math.ceil(parseFloat(cs.fontSize) * 1.3) || 18;
      const restColor = color ? cs.color : '';
      for (let i = slots.length; i < maxLen; i++) {
        const slot = slotBuildCell('');
        slot.setAttribute('aria-hidden', 'true');
        container.appendChild(slot);
        slots.push(slot);
      }
      const timers = [];
      const state = { timers, target: toText };
      slotStates.set(container, state);
      const outY = direction === 'down' ? H : -H;
      const inStart = direction === 'down' ? -H : H;
      const wobble = (i, salt) => {
        const n = Math.sin((i + 1) * 12.9898 + salt * 78.233) * 43758.5453;
        return (n - Math.floor(n)) * 2 - 1;
      };
      let maxEnd = 0;
      for (let i = 0; i < maxLen; i++) {
        const fromChar = fromText[i] || '';
        const toChar = toText[i] || '';
        if (fromChar === toChar && (skipUnchanged || fromChar === '')) continue;
        const slot = slots[i];
        const sizer = slot.querySelector('[data-slot-sizer]');
        const oldFace = slot.querySelector('[data-slot-face]');
        const oldW = slot.getBoundingClientRect().width;
        sizer.textContent = slotGlyph(toChar);
        const newW = sizer.getBoundingClientRect().width;
        const widthChanges = Math.abs(newW - oldW) > 0.5;
        if (widthChanges) slot.style.width = `${oldW}px`;
        if (fromChar === '' || toChar === '') slot.style.overflowX = 'clip';
        const tint = typeof color === 'function' ? color(i, maxLen) : color;
        const isTail = toChar === '';
        const d = Math.round(duration * (isTail ? 0.75 : 1) * (1 + bounce * 0.45 * wobble(i, 1)));
        const staggerIndex = isTail ? toText.length * 0.5 + (i - toText.length) * 0.25 : i;
        const base = Math.round(staggerIndex * stagger * (1 + bounce * 0.25 * wobble(i, 2)));
        const tilt = (bounce * 5 * wobble(i, 3)).toFixed(2);
        const newFace = slotMakeFace(toChar);
        newFace.style.willChange = 'transform';
        newFace.style.transformOrigin = '50% 50%';
        newFace.style.transform = `translateY(${inStart}px) rotate(${tilt}deg)`;
        if (tint) newFace.style.color = tint;
        slot.appendChild(newFace);
        void slot.offsetWidth;
        if (widthChanges) {
          let wDelay = base, wDur = d;
          if (isTail) { wDelay = base + Math.round(d * 0.55); wDur = Math.max(140, Math.round(d * 0.6)); }
          else if (fromChar === '') { wDur = Math.max(140, Math.round(d * 0.45)); }
          timers.push(setTimeout(() => {
            slot.style.transition = `width ${wDur}ms cubic-bezier(0.2, 0, 0, 1)`;
            slot.style.width = `${newW}px`;
          }, wDelay));
          maxEnd = Math.max(maxEnd, wDelay + wDur);
        }
        maxEnd = Math.max(maxEnd, base + exitOffset + d + (color ? colorFade : 0));
        // Backend-agnostic per-glyph roll tuple — IDENTICAL whether anime.js drives it or the
        // built-in CSS driver does (window.__slotTuples lets a test assert the parity). The driver
        // only chooses HOW to apply these numbers; cleanup (finishGlyph) is shared.
        const roll = {
          duration: d, outDelay: base, inDelay: base + exitOffset, easing,
          inStart, outY, tilt, colorFade,
          tint: color ? tint : null, restColor: color ? restColor : null,
        };
        if (typeof window !== 'undefined' && window.__slotTuples) window.__slotTuples.push(roll);
        const finishGlyph = () => {
          slot.dataset.char = toChar;
          slot.style.removeProperty('transition');
          slot.style.removeProperty('width');
          slot.style.overflowX = 'visible';
          slot.querySelectorAll('[data-slot-face]').forEach((f) => { if (f !== newFace) f.remove(); });
        };
        const driverCtx = { slot, oldFace, newFace, finishGlyph, timers };
        if (slotUseAnime()) slotDriveAnime(roll, driverCtx);
        else slotDriveCss(roll, driverCtx);
      }
      const total = maxEnd + 80;
      timers.push(setTimeout(() => {
        const pending = state.pending;
        slotStates.delete(container);
        buildSlotText(container, toText);
        if (pending) animateSlotText(container, pending.text, pending.options);
      }, total));
    }
    function attachSlotText(element, initialText, options = {}) {
      let value = initialText;
      buildSlotText(element, initialText);
      return {
        element,
        get value() { return value; },
        set(text, nextOptions = {}) { value = text; animateSlotText(element, text, { ...options, ...nextOptions }); },
      };
    }

    // Roll the column / section count badges from their previous value to the current one
    // whenever a task move changes a count. Persisted map (like the card signatures) so we
    // know the "before" value without a pre-render snapshot.
    let lastSectionCounts = {};
    function rollCounts(container) {
      const seen = {};
      sections.forEach((s) => {
        const cur = (tasks[s.id] || []).length;
        seen[s.id] = cur;
        const el = container && container.querySelector(`[data-count-for="${s.id}"]`);
        if (!el) return;
        const prev = lastSectionCounts[s.id];
        if (!prefersReducedMotion && prev !== undefined && prev !== cur) {
          buildSlotText(el, String(prev));
          animateSlotText(el, String(cur), { color: 'var(--accent)' });
        }
      });
      lastSectionCounts = seen;
    }

    // ============================================================
    // ===== CARD MOVE / CHANGE ANIMATIONS (FLIP, dependency-free) =====
    // ============================================================
    // Native Web Animations API — framer-motion is React-only and anime.js would add a CDN
    // runtime dep; WAAPI gives the same board-quality motion while keeping this a single
    // self-contained file. A card that changes column glides via a position:fixed ghost
    // clone on a top-level overlay, so it isn't clipped by the column's own scroll box.
    const prefersReducedMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    let lastCardSignatures = new Map();

    function taskSignature(t) {
      const subs = (t.subtasks || []).map(s => (s.checked ? '1' : '0') + s.text + '>' + (s.description || '')).join('|');
      return [t.checked ? 1 : 0, t.section, t.title, t.note, (t.needs || []).join(','), subs].join('¦');
    }
    function captureCardRects() {
      const map = new Map();
      document.querySelectorAll('#board .task-card[data-id]').forEach(c => {
        map.set(c.dataset.id, c.getBoundingClientRect());
      });
      return map;
    }
    function playBoardAnimations(prevRects) {
      const cards = document.querySelectorAll('#board .task-card[data-id]');
      // Skip motion while the task modal is open — the board is behind it, and a fixed
      // ghost (z-index 9000) would otherwise fly OVER the z-100 modal. Still refresh the
      // signature map so the next visible render diffs correctly.
      const modalOpen = !!(taskModalOverlay && taskModalOverlay.classList.contains('visible'));
      const nextSignatures = new Map();
      cards.forEach(card => {
        const id = card.dataset.id;
        const task = taskById(id);
        const newSig = task ? taskSignature(task) : undefined;
        if (newSig !== undefined) nextSignatures.set(id, newSig);
        if (prefersReducedMotion || modalOpen) return;

        const prev = prevRects && prevRects.get(id);
        const next = card.getBoundingClientRect();

        if (!prev) {
          // new (or first-paint) card — gentle fade/pop in place
          card.animate(
            [{ opacity: 0, transform: 'translateY(8px) scale(0.97)' }, { opacity: 1, transform: 'none' }],
            { duration: 240, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)' });
          return;
        }

        const dx = prev.left - next.left, dy = prev.top - next.top;
        if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
          // moved (column change or reorder): fly a ghost clone on a fixed overlay so it
          // glides over the gap between columns without being clipped by overflow.
          const ghost = card.cloneNode(true);
          ghost.classList.add('flip-ghost');
          ghost.style.cssText += `position:fixed; margin:0; left:${prev.left}px; top:${prev.top}px; width:${prev.width}px; height:${prev.height}px; z-index:9000; pointer-events:none;`;
          document.body.appendChild(ghost);
          card.style.visibility = 'hidden';
          const anim = ghost.animate(
            [{ transform: 'translate(0, 0)' }, { transform: `translate(${next.left - prev.left}px, ${next.top - prev.top}px)` }],
            { duration: 380, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)' });
          const cleanup = () => { ghost.remove(); if (card.isConnected) card.style.visibility = ''; };
          anim.addEventListener('finish', cleanup);
          anim.addEventListener('cancel', cleanup);
        } else {
          // same place but content changed (e.g. an agent ticked it done) — brief pulse
          const prevSig = lastCardSignatures.get(id);
          if (prevSig !== undefined && newSig !== undefined && prevSig !== newSig) {
            card.classList.remove('just-changed');
            void card.offsetWidth;             // restart the keyframe animation
            card.classList.add('just-changed');
            card.addEventListener('animationend', () => card.classList.remove('just-changed'), { once: true });
          }
        }
      });
      lastCardSignatures = nextSignatures;
    }

    // Expose functions to onclick handlers
    window.openFileModal = openFileModal;
    window.openNewFileModal = openNewFileModal;
    window.openEditModal = openEditModal;
    window.filterMemoryDirectory = filterMemoryDirectory;

    // ===== SERVER MODE: boot the live board automatically =====
    // Served by board-server.mjs → no manual file pickers: auto-load tasks + memory and
    // open the live (SSE) connection. The pickers become "Reload" buttons.
    startFreshnessClock();              // live/seconds/stale badge (both modes)

    if (SERVER_MODE) {
      openTaskBtn.textContent = 'Reload';
      openMemoryBtn.textContent = 'Reload';
      loadTasksFromServer(true);
      startWatching();
      loadMemoryFromServer();
    }
  </script>
</body>
</html>
