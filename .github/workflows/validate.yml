name: Validate

# Keeps the tracked Codex package (plugins/shaughv-tasks/) permanently in sync with
# root content. Runs on every PR into `main` and on every push to `main`: if the
# package has drifted from root skills/ / .codex-plugin/plugin.json, if a manifest is
# malformed, or if the version is out of lockstep across the three manifests +
# CHANGELOG, the run fails. Regenerate locally with:
#   pwsh ./build-codex-plugin.ps1
#
# This bundle ships no MCP servers, so (unlike shaughv-code) there is no .mcp.json to
# validate or wrap. The Codex package is committed by hand (per AGENTS.md); CI does not
# regenerate or commit anything — it only enforces that the committed package never
# falls out of sync.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest # pwsh + .NET parity with build-codex-plugin.ps1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON manifests
        shell: pwsh
        run: |
          $files = @(
            '.claude-plugin/marketplace.json',
            '.claude-plugin/plugin.json',
            '.agents/plugins/marketplace.json',
            '.codex-plugin/plugin.json',
            'plugins/shaughv-tasks/.codex-plugin/plugin.json'
          )
          foreach ($f in $files) {
            Get-Content $f -Raw | ConvertFrom-Json | Out-Null
            Write-Host "ok: $f"
          }

      - name: Validate tracked Codex plugin package (must be in sync + path-safe)
        # Rebuilds plugins/shaughv-tasks/ into a temp dir and SHA-compares it to the
        # committed copy. Fails if it drifted from root content, if the version is out
        # of lockstep, or if a packaged path exceeds the Windows clone limit.
        # Regenerate with: pwsh ./build-codex-plugin.ps1
        shell: pwsh
        run: ./build-codex-plugin.ps1 -Check

      - name: Version lockstep (3 manifests + CHANGELOG agree)
        shell: pwsh
        run: |
          $codex  = (Get-Content .codex-plugin/plugin.json -Raw | ConvertFrom-Json).version
          $claude = (Get-Content .claude-plugin/plugin.json -Raw | ConvertFrom-Json).version
          $market = (Get-Content .claude-plugin/marketplace.json -Raw | ConvertFrom-Json).plugins[0].version
          $clog   = ([regex]::Match((Get-Content CHANGELOG.md -Raw), '(?m)^##\s*\[(\d+\.\d+\.\d+)\]')).Groups[1].Value
          Write-Host "codex=$codex  claude=$claude  marketplace=$market  changelog=$clog"
          if (($codex -ne $claude) -or ($codex -ne $market) -or ($codex -ne $clog)) {
            Write-Error "VERSION LOCKSTEP DRIFT: codex=$codex claude=$claude marketplace=$market changelog=$clog"
            exit 1
          }
          Write-Host "version lockstep OK ($codex)"
